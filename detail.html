<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Oyun Detayı – anlık.io" />
    <title>Oyun Detay | anlık.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #262626;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #777;
            --border: rgba(255, 255, 255, 0.08);
            --font: 'Inter', sans-serif;
            --transition: 0.2s ease-in-out;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ── Top Navigation Bar ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: 56px;
            display: flex; align-items: center; padding: 0 20px;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--accent); text-decoration: none;
            font-weight: 600; font-size: 0.9rem;
            transition: var(--transition);
        }
        .back-btn:hover { color: var(--accent-hover); }
        .back-btn svg { width: 20px; height: 20px; }
        .topbar-title {
            flex: 1; text-align: center;
            font-size: 0.85rem; font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }
        .topbar-spacer { width: 80px; } /* dengelemek için */

        /* ── Page Container ── */
        .page { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }

        /* ── Header: İkon + Başlık + Kategori ── */
        .game-header {
            display: flex; align-items: center; gap: 18px;
            padding: 28px 0 22px;
        }
        .game-icon {
            width: 88px; height: 88px;
            border-radius: 22px;
            object-fit: cover;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            flex-shrink: 0;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .header-text { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        .game-name {
            font-size: 1.5rem; font-weight: 800;
            letter-spacing: -0.4px; line-height: 1.2;
        }
        .game-cat-tag {
            display: inline-block; align-self: flex-start;
            padding: 4px 12px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        /* ── HEMEN OYNA Butonu ── */
        .play-btn {
            display: block; width: 100%; padding: 16px 0;
            text-align: center; text-decoration: none;
            font-family: var(--font); font-weight: 800; font-size: 1.05rem;
            letter-spacing: 0.8px;
            color: #fff;
            background: var(--accent);
            border-radius: 14px;
            margin-bottom: 32px;
            transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35);
        }
        .play-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
        }
        .play-btn:active { transform: scale(0.98); }

        /* ── Galeri – Yatay Kaydırılabilir ── */
        .gallery {
            display: flex; gap: 14px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
            margin-bottom: 36px;
            scrollbar-width: none;
        }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery-img {
            flex: 0 0 88%;
            aspect-ratio: 16 / 9;
            border-radius: var(--radius);
            object-fit: cover;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            scroll-snap-align: start;
        }

        /* ── Bölümler (Hakkında / Nasıl Oynanır) ── */
        .section {
            margin-bottom: 32px;
        }
        .section-title {
            font-size: 1.15rem; font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .section-text {
            font-size: 0.92rem; line-height: 1.75;
            color: var(--text-secondary);
        }

        /* ── Divider ── */
        .divider {
            height: 1px; background: var(--border);
            margin: 0 0 32px;
        }

        /* ── Yükleniyor ── */
        .loading-state {
            text-align: center; padding: 120px 20px;
            color: var(--text-muted);
        }
        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── Animasyonlar ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .anim { animation: fadeUp 0.5s ease-out both; }
        .anim-d1 { animation-delay: 0.05s; }
        .anim-d2 { animation-delay: 0.12s; }
        .anim-d3 { animation-delay: 0.2s; }
        .anim-d4 { animation-delay: 0.28s; }
        .anim-d5 { animation-delay: 0.36s; }

        /* ── Mobil ── */
        @media (max-width: 600px) {
            .game-icon { width: 68px; height: 68px; border-radius: 18px; }
            .game-name { font-size: 1.2rem; }
            .play-btn { font-size: 0.95rem; padding: 14px 0; border-radius: 12px; }
            .gallery-img { flex: 0 0 92%; border-radius: 12px; }
            .section-title { font-size: 1.05rem; }
            .section-text { font-size: 0.87rem; }
            .game-header { padding: 22px 0 18px; }
        }
    </style>
</head>
<body>

    <!-- Üst Bar -->
    <nav class="topbar">
        <a href="index.html" class="back-btn" id="backBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Geri
        </a>
        <span class="topbar-title" id="topTitle">anlık.io</span>
        <span class="topbar-spacer"></span>
    </nav>

    <div class="page" id="pageContent">
        <!-- JS dolduracak -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <p>Oyun bilgileri yükleniyor...</p>
        </div>
    </div>

    <script>

        /* ── Kategori Renkleri ── */

        function getColor(cat) {
            return COLORS[(cat||"").toLocaleLowerCase("tr-TR").trim()] || DEF_COLOR;
        }

        /* ── Oyun Açıklamaları ── */

            "lazer-agi": {
                desc: "Lazer ışınlarından oluşan bir ağın içinden geç! Aynaları döndürerek lazer yolunu değiştir ve sensörleri aktive et.",

            "sinyal-kulesi-1-uyanis": {
                desc: "Sinyal Kulesi serisi başlıyor! Gizemli sinyaller alan bir kuledeki teknisyen olarak uyanıyorsun. Sinyalleri çöz ve gerçeği keşfet.",

            },
            "sinyal-kulesi-2-kacis": {
                desc: "Sinyal Kulesi II: Kuleden kaçış zamanı! Tehlike yaklaşıyor, sinyaller seni yönlendiriyor.",
                howTo: "Platform ve refleks mekanikleriyle engelleri aş. Sinyallerin yönlendirmelerine kulak ver."
            },
            "sinyal-kulesi-3-son-yayin": {
                desc: "Sinyal Kulesi Finali: Son Yayın. Kuleye geri dönüp son mesajı göndermelisin.",
                howTo: "Önceki bölümlerdeki yeteneklerin hepsini kullan. Boss mekaniklerini öğren ve son yayını gerçekleştir."
            }
        };
        const DEF_DESC = "Heyecan dolu bir oyun deneyimi seni bekliyor! Reflekslerini ve stratejini test et.";
        const DEF_HOWTO = "Klavye (WASD / Yön tuşları) veya dokunmatik ekran kontrolleri ile oyna. Detaylar oyun içinde açıklanır.";

        /* ── Başlat ── */
        (async () => {
            const params = new URLSearchParams(location.search);
            const gameId = params.get("id");

            if (!gameId) {
                location.href = "index.html";
                return;
            }

            try {
                const res = await fetch(`${LIST_URL}?t=${Date.now()}`, { cache: "no-store" });
                const raw = await res.json();
                const list = Array.isArray(raw) ? raw : (raw.games || []);

                const game = list.find(g => g.id === gameId);
                if (!game) {
                    loadingState.innerHTML = "<p>Oyun bulunamadı.</p>";
                    return;
                }

                const id    = game.id;
                const title = game.title || game.isim || "Oyun";
                const cat   = game.category || game.kategori || "Genel";
                const img   = game.image || game.resim || `https://picsum.photos/seed/${id}/400/400`;
                const url   = game.url || `./games/${id}/game.html`;
                const meta  = META[id] || {};
                const color = getColor(cat);

                document.title = `${title} | anlık.io`;
                topTitle.textContent = title;

                loadingState.remove();

                pageContent.innerHTML = `
                    <!-- Header -->
                    <div class="game-header anim">
                        <img class="game-icon" src="${img}" alt="${title}">
                        <div class="header-text">
                            <h1 class="game-name">${title}</h1>
                            <span class="game-cat-tag"
                                style="background:${color.bg}; border:1px solid ${color.border}; color:${color.text};"
                            >${cat}</span>
                        </div>
                    </div>

                    <!-- HEMEN OYNA -->
                    <a href="${url}" class="play-btn anim anim-d1">HEMEN OYNA</a>

                    <!-- Galeri -->
                    <div class="gallery anim anim-d2">
                        <img class="gallery-img" src="https://picsum.photos/seed/${id}-ss1/800/450" alt="${title} Ekran Görüntüsü 1">
                        <img class="gallery-img" src="https://picsum.photos/seed/${id}-ss2/800/450" alt="${title} Ekran Görüntüsü 2">
                    </div>

                    <!-- Hakkında -->
                    <div class="section anim anim-d3">
                        <h3 class="section-title">Bu Oyun Hakkında</h3>
                        <p class="section-text">${meta.desc || DEF_DESC}</p>
                    </div>

                    <div class="divider"></div>

                    <!-- Nasıl Oynanır -->
                    <div class="section anim anim-d4">
                        <h3 class="section-title">Nasıl Oynanır?</h3>
                        <p class="section-text">${meta.howTo || DEF_HOWTO}</p>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                loadingState.innerHTML = "<p>Hata oluştu.</p>";
            }
        })();
    </script>
</body>
</html>
