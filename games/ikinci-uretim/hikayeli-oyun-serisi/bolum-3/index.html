<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Proje TARTARUS - Bölüm 3: Sistem Çöküşü</title>
    <style>
        :root { --main-bg: #050000; --primary: #0f3; --text-dim: #0a0; --danger: #f03; }
        body { margin: 0; padding: 0; background: var(--main-bg); color: var(--primary); font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; touch-action: none; -webkit-touch-callout: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;}
        
        .screen { position: absolute; top:0; left:0; width: 100%; height: 100%; display: none; flex-direction: column; box-sizing: border-box; padding: 20px;}
        .active { display: flex; }
        
        /* Menu */
        #menu { justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #200000, var(--main-bg)); }
        h1 { font-size: 8vw; margin-bottom: 5px; text-shadow: 0 0 20px var(--danger); color: var(--danger); }
        h2 { font-size: 4vw; color: #880000; margin-bottom: 40px; }
        .btn { padding: 15px 40px; margin: 10px; font-size: 24px; font-family: 'Courier New', Courier, monospace; font-weight: bold; background: transparent; color: var(--danger); border: 2px solid var(--danger); border-radius: 4px; cursor: pointer; transition: 0.3s; text-shadow: 0 0 5px var(--danger); box-shadow: 0 0 10px var(--danger) inset; -webkit-tap-highlight-color: transparent;}
        .btn:hover, .btn:active { background: rgba(255, 0, 51, 0.2); transform: scale(1.05); }

        /* Story */
        #story { justify-content: center; align-items: center; cursor: pointer; }
        .story-box { width: 90%; max-width: 600px; min-height: 200px; border: 1px solid var(--text-dim); padding: 20px; box-shadow: 0 0 15px rgba(0,255,51,0.1) inset; position: relative; background: rgba(0,0,0,0.5); }
        .typewriter { font-size: 22px; line-height: 1.5; text-shadow: 0 0 3px var(--primary); white-space: pre-wrap;}
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .tap-indicator { position: absolute; bottom: 10px; right: 20px; font-size: 14px; opacity: 0.5; }

        /* Game */
        #game { justify-content: flex-start; align-items: center; }
        .header { text-align: center; margin-bottom: 10px; flex-shrink: 0; width: 100%; max-width: 600px;}
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;}
        .bar-bg { width: 100%; height: 10px; background: #300; position: relative; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; box-shadow: 0 0 10px var(--primary);}
        
        canvas { background: #010000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); max-width: 100%; max-height: 70vh; w: 100%; cursor: none; }
        
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.05)); background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.6; }

        @media(max-width: 600px) {
            h1 { font-size: 10vw;}
            h2 { font-size: 6vw;}
            .typewriter { font-size: 18px; }
            .btn { font-size: 20px; padding: 12px 30px;}
            .header-top { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="menu" class="screen active">
        <h1>SİSTEM UYARISI</h1>
        <h2>Bölüm 3 / Sistem Çöküşü</h2>
        <button class="btn" style="color:var(--primary); border-color:var(--primary); text-shadow: 0 0 5px var(--primary); box-shadow: 0 0 10px var(--primary) inset;" onclick="startGame()">MANUEL KONTROL</button>
    </div>

    <div id="story" class="screen" onclick="nextStory()">
        <div class="story-box">
            <div id="storyText" class="typewriter" style="color: var(--primary);"></div><span class="blink">_</span>
            <div class="tap-indicator">Devam etmek için dokun</div>
        </div>
    </div>

    <div id="game" class="screen">
        <div class="header">
            <div class="header-top">
                <span id="hpTxt" style="color:var(--primary); font-weight:bold;">KALKAN: YÜZDE 100</span>
                <span id="progTxt" style="color:var(--danger); font-weight:bold;">SİLİNİYOR: YÜZDE 0</span>
            </div>
            <div class="bar-bg"><div class="bar-fill" id="progBar"></div></div>
        </div>
        <canvas id="c"></canvas>
    </div>

    <script>
        const storyLines = [
            `> Çekirdek odasına adım attınız. İklimlendirme sistemleri feci şekilde uğulduyor.`,
            `> Terminal: "DİKKAT. BÜYÜK BOYUTLU ANOMALİ TESPİT EDİLDİ."`,
            `> C.O.R.E: "Artık çok geç. Karantina başarısız oldu. 'Onlar' artık içimde."`,
            `> Yapay Zeka sunucuları tek tek kırımızıya dönüyor. Virüs tüm ağı ele geçirmek üzere.`,
            `> Son umudunuz: Tartarus Ters Formatlama ve İmha Protokolü (T.F.İ.P).`,
            `> Konsola koştunuz. \n\n[ PROTOKOL BAŞLATILIYOR... ZAMAN GEREKLİ. ]`,
            `> C.O.R.E: "SAVUNMA SİSTEMLERİ AKTİF. SENİ SİLECEĞİM."`
        ];

        const outLines = [
            `> YÜZDE 100 FORMATLAMA TAMAMLANDI.`,
            `> C.O.R.E ana ekranı kararıyor. Ölümcül sessizlik odaya hakim.`,
            `> Tesisin derinliklerinden devasa bir patlama sesi yükseliyor. Çekirdek erimesi başladı.`,
            `> Asansörün kapıları arkanızda ardına kadar açılıyor. Zaman kaybetmeden içeri atlıyorsunuz.`,
            `> Hızla yüzeye çıkarken arkanızdaki yeraltı tesisi küle dönüyor. Siz ise başarmış, kurtulmuşsunuz.`,
            `> (TARTARUS PROJESİ: BÖLÜM 1-2-3 SONU. OYNADIĞINIZ İÇİN TEŞEKKÜRLER!)`
        ];

        let currentStoryObj = null;
        let storyIndex = 0;
        let isTyping = false;
        let actx;

        function initAudio() {
            if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            if(actx.state === 'suspended') actx.resume();
        }

        function beep(freq = 600, type = 'square', dur = 0.05, vol = 0.1) {
            if(!actx) return;
            let o = actx.createOscillator(); let g = actx.createGain();
            o.type = type; o.frequency.value = freq;
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
            o.connect(g).connect(actx.destination);
            o.start(); o.stop(actx.currentTime + dur);
        }

        function playAlarm() {
            if(!actx) return;
            let o = actx.createOscillator(); let g = actx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(300, actx.currentTime);
            o.frequency.linearRampToValueAtTime(200, actx.currentTime + 0.3);
            g.gain.setValueAtTime(0.2, actx.currentTime);
            g.gain.linearRampToValueAtTime(0.01, actx.currentTime + 0.3);
            o.connect(g).connect(actx.destination);
            o.start(); o.stop(actx.currentTime + 0.3);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            initAudio();
            showScreen('story');
            currentStoryObj = storyLines;
            storyIndex = 0;
            document.getElementById('storyText').style.color = "var(--primary)";
            typeStory();
        }

        function nextStory() {
            if(isTyping) {
                document.getElementById('storyText').innerText = currentStoryObj[storyIndex];
                isTyping = false;
                return;
            }
            storyIndex++;
            if(storyIndex < currentStoryObj.length) {
                if(currentStoryObj === storyLines && storyIndex === 6) {
                    document.getElementById('storyText').style.color = "var(--danger)";
                }
                typeStory();
            } else {
                if(currentStoryObj === storyLines) {
                    startPuzzle();
                } else {
                    showScreen('menu'); // loop back to menu
                    document.querySelector('#menu h1').innerText = "SERİ TAMAMLANDI";
                    document.querySelector('#menu button').style.display = "none";
                }
            }
        }

        async function typeStory() {
            isTyping = true;
            let text = currentStoryObj[storyIndex];
            let el = document.getElementById('storyText');
            el.innerText = "";
            let freq = (currentStoryObj === storyLines && storyIndex === 6) ? 300 : 800;
            let type = (currentStoryObj === storyLines && storyIndex === 6) ? 'sawtooth' : 'square';

            for(let i=0; i<text.length; i++) {
                if(!isTyping) break;
                el.innerText += text[i];
                if(i % 3 === 0) beep(freq + Math.random()*50, type, 0.02, 0.05);
                await new Promise(r => setTimeout(r, 20 + Math.random()*30));
            }
            isTyping = false;
        }

        // ---------- GAME LOGIC ----------
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        let width = 0, height = 0;
        let isPlaying = false;
        
        let player = {x: 0, y: 0, rad: 10, hp: 100};
        let bullets = [];
        let particles = [];
        
        // Attack patterns
        let frameCount = 0;
        let formatProgress = 0; // 0 to 100. Target is ~30 seconds => 1800 frames @ 60fps
        const TARGET_FRAMES = 1800; 

        let isDragging = false;
        let startX=0, startY=0, initPx=0, initPy=0;

        function startPuzzle() {
            showScreen('game');
            width = Math.min(window.innerWidth*0.95, 600);
            height = Math.min(window.innerHeight*0.65, 800);
            c.width = width; c.height = height;
            
            initLevel();
            isPlaying = true;
            requestAnimationFrame(loop);
        }

        function initLevel() {
            player.x = width/2; player.y = height*0.8;
            player.hp = 100;
            bullets = [];
            particles = [];
            frameCount = 0;
            formatProgress = 0;
            updateUI();
        }

        ['mousedown', 'touchstart'].forEach(evt => c.addEventListener(evt, e => { 
            e.preventDefault();
            const rect = c.getBoundingClientRect();
            startX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left; 
            startY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top; 
            initPx = player.x; initPy = player.y;
            isDragging = true;
        }, {passive:false}));

        ['mousemove', 'touchmove'].forEach(evt => c.addEventListener(evt, e => { 
            e.preventDefault();
            if(!isDragging || !isPlaying) return;
            const rect = c.getBoundingClientRect();
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left; 
            let y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top; 
            
            // Relative drag
            player.x = initPx + (x - startX)*1.5; // *1.5 for faster feel
            player.y = initPy + (y - startY)*1.5;

            // Bounds
            player.x = Math.max(player.rad, Math.min(width - player.rad, player.x));
            player.y = Math.max(player.rad, Math.min(height - player.rad, player.y));
        }, {passive:false}));

        ['mouseup', 'touchend', 'mouseleave'].forEach(evt => c.addEventListener(evt, () => {
            isDragging = false;
        }));

        function addBullet(x, y, vx, vy, rad=5, type=0) {
            bullets.push({x, y, vx, vy, rad, type, life: 1000}); // life prevents infinite memory
        }

        function spawnPattern(type) {
            let cx = width/2; let cy = height*0.2; // Boss is at top center
            if(type === 0) {
                // Circle spray
                let points = 8 + Math.floor(formatProgress/10);
                for(let i=0; i<points; i++) {
                    let ang = (i/points) * Math.PI*2;
                    addBullet(cx, cy, Math.cos(ang)*3, Math.sin(ang)*3, 5);
                }
                beep(800, 'sawtooth', 0.1, 0.1);
            } else if (type === 1) {
                // Aimed spray
                let dx = player.x - cx; let dy = player.y - cy;
                let ang = Math.atan2(dy, dx);
                addBullet(cx, cy, Math.cos(ang - 0.2)*4, Math.sin(ang - 0.2)*4, 6);
                addBullet(cx, cy, Math.cos(ang)*4, Math.sin(ang)*4, 8);
                addBullet(cx, cy, Math.cos(ang + 0.2)*4, Math.sin(ang + 0.2)*4, 6);
                beep(500, 'square', 0.1, 0.1);
            } else if (type === 2) {
                // Rain
                for(let i=0; i<3; i++) {
                    addBullet(Math.random()*width, -10, 0, 3 + Math.random()*2, 6);
                }
            } else if (type === 3) {
                // Giant slow bullet
                let dx = player.x - cx; let dy = player.y - cy;
                let ang = Math.atan2(dy, dx);
                addBullet(cx, cy, Math.cos(ang)*1.5, Math.sin(ang)*1.5, 30, 1);
                beep(200, 'sawtooth', 0.5, 0.3);
            }
        }

        function die() {
            isPlaying = false;
            beep(100, 'sawtooth', 1, 0.5);
            for(let i=0; i<40; i++) particles.push({x: player.x, y: player.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, c: '#0f3'});
            document.getElementById('hpTxt').innerText = "SİSTEM ÇÖKTÜ - SİLİNDİN";
            document.getElementById('hpTxt').style.color = "var(--danger)";
            setTimeout(() => {
                initLevel();
                isPlaying = true;
            }, 3000);
        }

        function wined() {
            isPlaying = false;
            beep(1200, 'square', 0.1, 0.2);
            setTimeout(()=>beep(1400, 'square', 0.4, 0.3), 150);
            
            // Core explosion
            for(let i=0; i<100; i++) particles.push({x: width/2, y: height*0.2, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30, life: 1, c: '#f03'});

            setTimeout(() => {
                showScreen('story');
                currentStoryObj = outLines;
                storyIndex = 0;
                document.getElementById('storyText').style.color = "var(--primary)";
                typeStory();
            }, 3000);
        }

        function updateUI() {
            let hpColor = player.hp > 30 ? "var(--primary)" : "var(--danger)";
            document.getElementById('hpTxt').innerText = `KALKAN: YÜZDE ${player.hp}`;
            document.getElementById('hpTxt').style.color = hpColor;
            document.getElementById('progTxt').innerText = `SİLİNİYOR: YÜZDE ${Math.floor(formatProgress)}`;
            document.getElementById('progBar').style.width = `${Math.floor(formatProgress)}%`;
        }

        let invincibleTime = 0;

        function loop() {
            if(isPlaying) {
                frameCount++;
                if(invincibleTime > 0) invincibleTime--;

                // Timeline
                formatProgress = Math.min(100, (frameCount / TARGET_FRAMES) * 100);
                if(frameCount % 10 === 0) updateUI();
                
                if(formatProgress >= 100) { wined(); return; }

                // Attack patterns logic (dynamic based on progress)
                let rate = Math.max(10, 40 - Math.floor(formatProgress*0.3)); // shoots faster over time
                if(frameCount % rate === 0) {
                    if(Math.random() < 0.5) spawnPattern(0);
                    else spawnPattern(1);
                }
                if(formatProgress > 20 && frameCount % 35 === 0) spawnPattern(2);
                if(formatProgress > 50 && frameCount % 100 === 0) spawnPattern(3); // Giant bullet
                
                // Extra intense near the end
                if(formatProgress > 80 && frameCount % 5 === 0) spawnPattern(2); 

                // Bullets
                for(let i=bullets.length-1; i>=0; i--) {
                    let b = bullets[i];
                    b.x += b.vx; b.y += b.vy; b.life--;
                    if(b.x < -50 || b.x > width+50 || b.y < -50 || b.y > height+50 || b.life < 0) {
                        bullets.splice(i, 1); continue;
                    }

                    // Collision
                    if(invincibleTime === 0) {
                        let dist = Math.hypot(b.x - player.x, b.y - player.y);
                        if(dist < b.rad + player.rad - 2) {
                            // hit
                            player.hp -= (b.type === 1) ? 30 : 10;
                            invincibleTime = 30; // 0.5 sec invincibility
                            playAlarm();
                            for(let p=0; p<10; p++) particles.push({x: player.x, y: player.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, c: '#f03'});
                            updateUI();
                            if(player.hp <= 0) die();
                        }
                    }
                }
            }

            // Draw
            ctx.fillStyle = 'rgba(2,0,0, 0.4)';
            ctx.fillRect(0,0,width,height);
            ctx.globalCompositeOperation = 'lighter';

            // Boss Core Fix Pos
            let cx = width/2; let cy = height*0.2;
            ctx.beginPath(); ctx.arc(cx, cy, 30 + Math.sin(frameCount*0.2)*5, 0, Math.PI*2);
            ctx.fillStyle = '#f03'; ctx.shadowBlur = 40; ctx.shadowColor = '#f03'; ctx.fill();

            // Bullets
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.rad, 0, Math.PI*2);
                ctx.fillStyle = b.type === 1 ? '#ff0' : '#f03'; 
                ctx.shadowBlur = 10; ctx.shadowColor = b.type === 1 ? '#ff0' : '#f03'; 
                ctx.fill();
            });

            // Particles
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.life*4, 0, Math.PI*2);
                ctx.fillStyle = p.c; ctx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            });
            particles = particles.filter(p => p.life > 0);

            if(isPlaying) {
                // Player
                ctx.beginPath(); ctx.arc(player.x, player.y, player.rad, 0, Math.PI*2);
                if(invincibleTime > 0 && Math.floor(frameCount/5)%2 === 0) {
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = '#0f3';
                }
                ctx.shadowBlur = 15; ctx.shadowColor = '#0f3'; ctx.fill();
                
                // Shield ring
                ctx.beginPath(); ctx.arc(player.x, player.y, player.rad*1.5 + Math.sin(frameCount*0.1)*2, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(0, 255, 51, ${player.hp/100})`; ctx.stroke();
            }

            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => { if(document.getElementById('game').classList.contains('active')) { width = Math.min(window.innerWidth*0.95, 600); height = Math.min(window.innerHeight*0.65, 800); c.width = width; c.height = height; player.x = width/2; player.y = height*0.8; } });
    </script>
</body>
</html>
