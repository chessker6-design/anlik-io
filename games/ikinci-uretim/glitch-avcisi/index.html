<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glitch Avcisi</title>
  <style>
    :root {
      --text: #e8f6ff;
      --panel: rgba(8, 18, 27, 0.82);
      --line: rgba(98, 255, 180, 0.35);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 15% 20%, #122533, #04070d 58%);
      font-family: "Verdana", "Segoe UI", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; touch-action: none; }
    .hud {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top, 0px));
      left: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--text);
      pointer-events: none;
      font-weight: 800;
      letter-spacing: 0.05em;
      flex-wrap: wrap;
      z-index: 2;
    }
    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      text-shadow: 0 0 12px rgba(0,0,0,0.7);
      backdrop-filter: blur(2px);
      min-width: 96px;
      text-align: center;
    }
    .barWrap {
      min-width: 160px;
      flex: 1;
      height: 20px;
      border-radius: 999px;
      border: 1px solid rgba(99,255,176,0.5);
      background: rgba(7, 18, 16, 0.9);
      overflow: hidden;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38ef7d, #afff4b);
      transition: width 50ms linear;
      box-shadow: 0 0 12px rgba(88,255,160,0.7);
    }
    .center {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 4px 20px rgba(0,0,0,0.75);
      padding: 20px;
      z-index: 3;
    }
    .title { font-size: clamp(28px, 5vw, 58px); font-weight: 900; letter-spacing: 0.08em; }
    .hint { margin-top: 10px; white-space: pre-line; font-weight: 700; }
    @media (max-width: 620px) {
      .pill { font-size: 12px; min-width: 84px; }
      .barWrap { min-width: 120px; height: 18px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="pill" id="score">SKOR: 0</div>
    <div class="pill" id="combo">KOMBO: 0</div>
    <div class="barWrap"><div class="bar" id="comboBar"></div></div>
    <div class="pill" id="status">MOD: NORMAL</div>
  </div>
  <div class="center" id="overlay">
    <div>
      <div class="title">GLITCH AVCISI</div>
      <div class="hint">PC: tikla
Mobil: hizli dokun
Iskalarsan kombo sifirlanir
Baslamak icin dokun</div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const statusEl = document.getElementById('status');
  const comboBarEl = document.getElementById('comboBar');

  function resize() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener('resize', resize);
  resize();

  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playZap(streak) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    const base = 420 + Math.min(700, streak * 36);
    osc.frequency.setValueAtTime(base, t);
    osc.frequency.exponentialRampToValueAtTime(base * 1.3, t + 0.05);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.17, t + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.08);
  }

  function playStatic() {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.08;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 950;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.16;
    src.buffer = buffer;
    src.connect(filter).connect(gain).connect(audioCtx.destination);
    src.start();
  }

  const state = {
    running: false,
    score: 0,
    combo: 0,
    comboFill: 0,
    slowMo: 0,
    spawnTimer: 0,
    targets: [],
    particles: [],
    flash: 0,
    time: 0
  };

  function reset() {
    state.score = 0;
    state.combo = 0;
    state.comboFill = 0;
    state.slowMo = 0;
    state.spawnTimer = 0;
    state.targets.length = 0;
    state.particles.length = 0;
    state.flash = 0;
    state.time = 0;
  }

  function start() {
    ensureAudio();
    reset();
    state.running = true;
    overlay.style.display = 'none';
    for (let i = 0; i < 6; i++) spawnTarget();
  }

  function targetSeparationOk(x, y, r) {
    const pad = innerWidth < 620 ? 8 : 12;
    for (const t of state.targets) {
      const d = Math.hypot(x - t.x, y - t.y);
      if (d < r + t.r + pad) return false;
    }
    return true;
  }

  function randomTargetPosition(r) {
    const topPad = innerWidth < 620 ? 88 : 70;
    const maxAttempts = 45;
    for (let i = 0; i < maxAttempts; i++) {
      const x = r + 16 + Math.random() * Math.max(1, innerWidth - 2 * (r + 16));
      const y = r + topPad + Math.random() * Math.max(1, innerHeight - (r + topPad + 16));
      if (targetSeparationOk(x, y, r)) return { x, y };
    }
    return null;
  }

  function spawnTarget() {
    const rBase = innerWidth < 620 ? 18 : 14;
    const r = rBase + Math.random() * 10;
    const pos = randomTargetPosition(r);
    if (!pos) return;
    const speedBase = (innerWidth < 620 ? 90 : 100) + Math.random() * 130;
    const angle = Math.random() * Math.PI * 2;
    state.targets.push({
      x: pos.x,
      y: pos.y,
      r,
      vx: Math.cos(angle) * speedBase,
      vy: Math.sin(angle) * speedBase,
      warpT: 0.35 + Math.random() * 0.8,
      hue: 160 + Math.random() * 120
    });
  }

  function explodeMatrix(x, y, count = 22) {
    const chars = '01#@$%&';
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 180;
      state.particles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 30,
        life: 0.35 + Math.random() * 0.5,
        t: 0,
        char: chars[(Math.random() * chars.length) | 0],
        size: 10 + Math.random() * 8
      });
    }
  }

  function onMiss() {
    state.combo = 0;
    state.comboFill = 0;
    playStatic();
  }

  function onHit(i) {
    const t = state.targets[i];
    state.targets.splice(i, 1);
    explodeMatrix(t.x, t.y);
    state.flash = 0.016;
    state.combo += 1;
    state.comboFill = Math.min(100, state.comboFill + 15);
    state.score += 10 + Math.floor(state.combo * 1.5);
    playZap(state.combo);

    if (state.comboFill >= 100 && state.slowMo <= 0) {
      state.slowMo = 3.5;
      state.comboFill = 0;
    }

    if (state.targets.length < 8) spawnTarget();
  }

  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    ensureAudio();
    if (!state.running) {
      start();
      return;
    }

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    let hitIndex = -1;
    for (let i = state.targets.length - 1; i >= 0; i--) {
      const t = state.targets[i];
      if (Math.hypot(x - t.x, y - t.y) <= t.r + 2) {
        hitIndex = i;
        break;
      }
    }

    if (hitIndex >= 0) onHit(hitIndex);
    else onMiss();
  }, { passive: false });

  function update(dt) {
    if (!state.running) return;

    state.time += dt;
    if (state.slowMo > 0) state.slowMo -= dt;
    const slowFactor = state.slowMo > 0 ? 0.45 : 1;

    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0) {
      spawnTarget();
      state.spawnTimer = Math.max(0.2, 0.65 - state.time * 0.015);
    }

    const topBound = innerWidth < 620 ? 74 : 56;

    for (let i = state.targets.length - 1; i >= 0; i--) {
      const t = state.targets[i];
      t.x += t.vx * dt * slowFactor;
      t.y += t.vy * dt * slowFactor;
      t.warpT -= dt;

      if (t.x - t.r < 0 || t.x + t.r > innerWidth) t.vx *= -1;
      if (t.y - t.r < topBound || t.y + t.r > innerHeight) t.vy *= -1;
      t.x = Math.max(t.r, Math.min(innerWidth - t.r, t.x));
      t.y = Math.max(topBound + t.r, Math.min(innerHeight - t.r, t.y));

      if (t.warpT <= 0) {
        const pos = randomTargetPosition(t.r);
        if (pos) {
          t.x = pos.x;
          t.y = pos.y;
        }
        t.warpT = 0.22 + Math.random() * 0.65;
      }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.t += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 110 * dt;
      if (p.t >= p.life) state.particles.splice(i, 1);
    }

    if (state.flash > 0) state.flash -= dt;

    scoreEl.textContent = 'SKOR: ' + state.score;
    comboEl.textContent = 'KOMBO: ' + state.combo;
    comboBarEl.style.width = state.comboFill.toFixed(1) + '%';
    statusEl.textContent = state.slowMo > 0 ? 'MOD: KOMBO YAVASLATMA' : 'MOD: NORMAL';
  }

  function drawScene(offsetX = 0, tint = null) {
    const g = ctx.createLinearGradient(0, 0, 0, innerHeight);
    g.addColorStop(0, '#07111b');
    g.addColorStop(1, '#03070c');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    ctx.globalAlpha = 0.18;
    for (let x = -40; x < innerWidth + 40; x += 32) {
      ctx.fillStyle = '#16384b';
      const shift = (state.time * 20 + x * 0.15) % 32;
      ctx.fillRect(x + offsetX, shift, 2, innerHeight);
    }
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(offsetX, 0);

    for (const t of state.targets) {
      ctx.fillStyle = `hsl(${t.hue}, 95%, 60%)`;
      ctx.fillRect(t.x - t.r, t.y - t.r, t.r * 2, t.r * 2);
      ctx.fillStyle = '#031f17';
      ctx.fillRect(t.x - t.r + 4, t.y - t.r + 4, t.r * 2 - 8, t.r * 2 - 8);
    }

    ctx.font = innerWidth < 620 ? 'bold 12px Consolas, monospace' : 'bold 14px Consolas, monospace';
    for (const p of state.particles) {
      const a = 1 - p.t / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = '#63ff8b';
      ctx.fillText(p.char, p.x, p.y);
    }
    ctx.globalAlpha = 1;

    if (tint) {
      ctx.globalAlpha = tint.a;
      ctx.fillStyle = tint.c;
      ctx.fillRect(0, 0, innerWidth, innerHeight);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  function draw() {
    if (state.flash > 0) {
      drawScene(-2, { c: 'rgba(255,0,0,0.08)', a: 0.45 });
      drawScene(2, { c: 'rgba(0,140,255,0.08)', a: 0.45 });
    } else {
      drawScene(0, null);
    }

    if (!state.running) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, 0, innerWidth, innerHeight);
    }
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
