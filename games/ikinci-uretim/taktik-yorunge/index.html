<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taktik Yörünge - İki Kişilik Topçu Savaşı</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            color: #fff;
        }

        canvas {
            display: block;
        }

        /* Arayüz */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .player-stats {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid;
            min-width: 150px;
        }

        #p1-stats {
            border-color: #00e5ff;
            text-shadow: 0 0 5px #00e5ff;
        }

        #p2-stats {
            border-color: #ff1744;
            text-shadow: 0 0 5px #ff1744;
            text-align: right;
        }

        .hp-bar-bg {
            width: 100%;
            height: 10px;
            background: #333;
            margin-top: 5px;
        }

        .hp-bar {
            height: 100%;
            transition: width 0.3s;
        }

        #p1-hp {
            background: #00e5ff;
            width: 100%;
        }

        #p2-hp {
            background: #ff1744;
            width: 100%;
        }

        #center-hud {
            text-align: center;
            font-size: 24px;
            text-shadow: 0 0 10px #fff;
            flex-grow: 1;
        }

        #wind-display {
            font-size: 32px;
            margin-top: 10px;
            color: #b2bec3;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            text-align: center;
            text-shadow: 0 0 20px #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            display: none;
            pointer-events: auto;
            cursor: pointer;
            z-index: 30;
        }

        /* Dokunmatik Kontroller (Mobil için iki yana ayrılmış) */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            z-index: 20;
        }

        #controls-p1 {
            left: 20px;
        }

        #controls-p2 {
            right: 20px;
            align-items: flex-end;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 5px;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-fire {
            width: 110px;
            font-weight: bold;
        }

        #controls-p1 .btn-fire {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        #controls-p2 .btn-fire {
            border-color: #ff1744;
            color: #ff1744;
        }

        @media (min-width: 1024px) {
            .mobile-controls {
                display: none;
            }

            /* PC'de gizle */
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="player-stats" id="p1-stats">
            <h2 style="margin:0;">Mavi Takım</h2>
            <div>Açı: <span id="p1-angle">45</span>° | Güç: <span id="p1-power">50</span></div>
            <div class="hp-bar-bg">
                <div class="hp-bar" id="p1-hp"></div>
            </div>
            <div style="font-size:12px; margin-top:5px; color:#aaa;">(W/S/A/D ve BOŞLUK)</div>
        </div>

        <div id="center-hud">
            <div id="turn-indicator">Sıra: MAVİ</div>
            <div id="wind-display">Rüzgar: 0.0</div>
        </div>

        <div class="player-stats" id="p2-stats">
            <h2 style="margin:0;">Kırmızı Takım</h2>
            <div>Açı: <span id="p2-angle">135</span>° | Güç: <span id="p2-power">50</span></div>
            <div class="hp-bar-bg">
                <div class="hp-bar" id="p2-hp"></div>
            </div>
            <div style="font-size:12px; margin-top:5px; color:#aaa;">(Yön Tuşları ve ENTER)</div>
        </div>
    </div>

    <div id="controls-p1" class="mobile-controls">
        <div class="btn-row">
            <div class="btn" id="btn-p1-up">▲</div>
            <div class="btn" id="btn-p1-down">▼</div>
        </div>
        <div class="btn-row">
            <div class="btn" id="btn-p1-left">◀</div>
            <div class="btn" id="btn-p1-right">▶</div>
        </div>
        <div class="btn btn-fire" id="btn-p1-fire">ATEŞ</div>
    </div>

    <div id="controls-p2" class="mobile-controls">
        <div class="btn-row">
            <div class="btn" id="btn-p2-up">▲</div>
            <div class="btn" id="btn-p2-down">▼</div>
        </div>
        <div class="btn-row">
            <div class="btn" id="btn-p2-left">◀</div>
            <div class="btn" id="btn-p2-right">▶</div>
        </div>
        <div class="btn btn-fire" id="btn-p2-fire">ATEŞ</div>
    </div>

    <div id="message"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiElements = {
            p1Angle: document.getElementById('p1-angle'),
            p1Power: document.getElementById('p1-power'),
            p1Hp: document.getElementById('p1-hp'),
            p2Angle: document.getElementById('p2-angle'),
            p2Power: document.getElementById('p2-power'),
            p2Hp: document.getElementById('p2-hp'),
            turn: document.getElementById('turn-indicator'),
            wind: document.getElementById('wind-display'),
            msg: document.getElementById('message')
        };

        let width, height;
        let terrain = [];
        let screenShake = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (gameState === 'init') generateTerrain();
        }
        window.addEventListener('resize', resize);

        // --- SES MOTORU (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function initAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playShoot() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        let whistleOsc, whistleGain;
        function startWhistle() {
            whistleOsc = audioCtx.createOscillator();
            whistleGain = audioCtx.createGain();
            whistleOsc.type = 'sine';
            whistleOsc.frequency.setValueAtTime(800, audioCtx.currentTime);
            whistleOsc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 2); // Düşen tiz ses
            whistleGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            whistleOsc.connect(whistleGain); whistleGain.connect(audioCtx.destination);
            whistleOsc.start();
        }
        function stopWhistle() {
            if (whistleOsc) {
                whistleOsc.stop();
                whistleOsc = null;
            }
        }

        function playExplosion() {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- OYUN NESNELERİ ---
        const gravity = 0.15;
        let wind = 0;
        let gameState = 'init'; // init, aiming, firing, gameover
        let currentTurn = 1;

        class Player {
            constructor(id, color, isLeft) {
                this.id = id;
                this.color = color;
                this.isLeft = isLeft;
                this.x = isLeft ? 150 : width - 150;
                this.y = 0;
                this.width = 30;
                this.height = 20;
                this.hp = 100;
                this.angle = isLeft ? 45 : 135;
                this.power = 50;
            }
            updatePos() {
                // Zemine oturt
                let tx = Math.floor(this.x);
                if (tx >= 0 && tx < width) this.y = terrain[tx] - this.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);

                // Namlu
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 5);
                let rad = this.angle * Math.PI / 180;
                ctx.lineTo(this.x + Math.cos(rad) * 25, this.y + 5 - Math.sin(rad) * 25);
                ctx.lineWidth = 4;
                ctx.strokeStyle = this.color;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Hedefleme çizgisi (Sadece sırası gelene)
                if (gameState === 'aiming' && currentTurn === this.id) {
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(this.x + Math.cos(rad) * 25, this.y + 5 - Math.sin(rad) * 25);
                    ctx.lineTo(this.x + Math.cos(rad) * (this.power * 1.5), this.y + 5 - Math.sin(rad) * (this.power * 1.5));
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        let p1, p2;
        let projectile = null;
        let particles = [];
        let trails = [];

        // --- ZEMİN OLUŞTURMA VE YIKIM ---
        function generateTerrain() {
            terrain = [];
            let baseY = height * 0.7;
            for (let i = 0; i < width; i++) {
                let h = baseY + Math.sin(i * 0.005) * 100 + Math.sin(i * 0.02) * 20;
                terrain.push(h);
            }
        }

        function destroyTerrain(cx, cy, radius) {
            for (let i = Math.floor(cx - radius); i <= Math.floor(cx + radius); i++) {
                if (i >= 0 && i < width) {
                    let dx = i - cx;
                    let dy = Math.sqrt(radius * radius - dx * dx); // Çember denklemi
                    if (terrain[i] < cy + dy) {
                        terrain[i] = cy + dy; // Zemin aşağı doğru kazılır
                    }
                }
            }
        }

        function initGame() {
            resize();
            generateTerrain();
            p1 = new Player(1, '#00e5ff', true);
            p2 = new Player(2, '#ff1744', false);
            p1.updatePos();
            p2.updatePos();
            currentTurn = 1;
            gameState = 'aiming';
            particles = [];
            trails = [];
            projectile = null;
            uiElements.msg.style.display = 'none';
            randomizeWind();
            updateUI();
        }

        function randomizeWind() {
            wind = (Math.random() - 0.5) * 0.1; // -0.05 ile 0.05 arası rüzgar gücü
            let dir = wind > 0 ? "▶▶" : "◀◀";
            uiElements.wind.innerText = `Rüzgar: ${dir} ${(Math.abs(wind) * 100).toFixed(1)}`;
            uiElements.wind.style.color = wind > 0 ? '#ffb8b8' : '#b8eaff';
        }

        // --- KONTROLLER ---
        const keys = {};
        window.addEventListener('keydown', e => { initAudio(); keys[e.key.toLowerCase()] = true; handleFire(); });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Mobil Buton Bağlamaları
        const bindBtn = (id, key) => {
            let btn = document.getElementById(id);
            btn.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); keys[key] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', e => { keys[key] = true; });
            btn.addEventListener('mouseup', e => { keys[key] = false; });
            btn.addEventListener('mouseleave', e => { keys[key] = false; });
        };
        bindBtn('btn-p1-up', 'w'); bindBtn('btn-p1-down', 's');
        bindBtn('btn-p1-left', 'a'); bindBtn('btn-p1-right', 'd');
        bindBtn('btn-p2-up', 'arrowup'); bindBtn('btn-p2-down', 'arrowdown');
        bindBtn('btn-p2-left', 'arrowleft'); bindBtn('btn-p2-right', 'arrowright');

        document.getElementById('btn-p1-fire').addEventListener('click', () => { initAudio(); if (currentTurn === 1 && gameState === 'aiming') fire(); });
        document.getElementById('btn-p2-fire').addEventListener('click', () => { initAudio(); if (currentTurn === 2 && gameState === 'aiming') fire(); });

        function handleFire() {
            if (gameState !== 'aiming') return;
            if (currentTurn === 1 && keys[' ']) fire();
            if (currentTurn === 2 && keys['enter']) fire();
        }

        function fire() {
            gameState = 'firing';
            let p = currentTurn === 1 ? p1 : p2;
            let rad = p.angle * Math.PI / 180;

            projectile = {
                x: p.x + Math.cos(rad) * 25,
                y: p.y + 5 - Math.sin(rad) * 25,
                vx: Math.cos(rad) * (p.power * 0.3),
                vy: -Math.sin(rad) * (p.power * 0.3),
                color: p.color
            };

            playShoot();
            startWhistle();
        }

        // --- GÜNCELLEME VE FİZİK ---
        function update() {
            if (gameState === 'aiming') {
                let p = currentTurn === 1 ? p1 : p2;

                // P1 Kontroller
                if (currentTurn === 1) {
                    if (keys['w']) p.angle += 1;
                    if (keys['s']) p.angle -= 1;
                    if (keys['a'] && p.power > 10) p.power -= 1;
                    if (keys['d'] && p.power < 100) p.power += 1;
                }
                // P2 Kontroller
                if (currentTurn === 2) {
                    if (keys['arrowup']) p.angle -= 1; // P2 sola bakıyor, açı ters yönde artar
                    if (keys['arrowdown']) p.angle += 1;
                    if (keys['arrowleft'] && p.power < 100) p.power += 1;
                    if (keys['arrowright'] && p.power > 10) p.power -= 1;
                }

                // Açı Sınırları
                if (currentTurn === 1) { p.angle = Math.max(0, Math.min(180, p.angle)); }
                else { p.angle = Math.max(0, Math.min(180, p.angle)); }

                updateUI();
            }

            if (gameState === 'firing' && projectile) {
                // İz bırakma
                trails.push({ x: projectile.x, y: projectile.y, life: 1.0, color: projectile.color });

                // Fizik hesaplama
                projectile.vy += gravity;
                projectile.vx += wind;
                projectile.x += projectile.vx;
                projectile.y += projectile.vy;

                // Ekran dışına çıkma
                if (projectile.x < -500 || projectile.x > width + 500 || projectile.y > height + 500) {
                    stopWhistle();
                    nextTurn();
                } else {
                    checkCollision();
                }
            }

            // Partikül ve İz güncellemeleri
            for (let i = trails.length - 1; i >= 0; i--) {
                trails[i].life -= 0.02;
                if (trails[i].life <= 0) trails.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += gravity * 0.5; // partiküller de düşer
                particles[i].life -= 0.03;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Ekran titremesi azalsın
            if (screenShake > 0) screenShake *= 0.9;
            if (screenShake < 0.5) screenShake = 0;

            // Zemin çökmeleri tankları düşürür
            if (p1 && p2) { p1.updatePos(); p2.updatePos(); }
        }

        function checkCollision() {
            let px = projectile.x;
            let py = projectile.y;

            // Oyuncuya Çarpma
            let hitP1 = Math.abs(px - p1.x) < 20 && Math.abs(py - p1.y) < 20;
            let hitP2 = Math.abs(px - p2.x) < 20 && Math.abs(py - p2.y) < 20;

            // Zemine Çarpma
            let hitTerrain = false;
            let tx = Math.floor(px);
            if (tx >= 0 && tx < width && py >= terrain[tx]) hitTerrain = true;

            if (hitP1 || hitP2 || hitTerrain) {
                stopWhistle();
                playExplosion();
                screenShake = 15;
                createExplosion(px, py, projectile.color);
                destroyTerrain(px, py, 40); // 40px yarıçapında krater

                if (hitP1) { p1.hp -= 30; }
                if (hitP2) { p2.hp -= 30; }

                projectile = null;
                updateUI();

                if (p1.hp <= 0 || p2.hp <= 0) {
                    endGame();
                } else {
                    setTimeout(nextTurn, 1000);
                }
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10 - 2,
                    life: 1.0,
                    color: Math.random() > 0.5 ? color : '#fff'
                });
            }
        }

        function nextTurn() {
            currentTurn = currentTurn === 1 ? 2 : 1;
            gameState = 'aiming';
            randomizeWind();
            updateUI();
        }

        function updateUI() {
            if (!p1 || !p2) return;
            uiElements.p1Angle.innerText = p1.angle;
            uiElements.p1Power.innerText = p1.power;
            uiElements.p1Hp.style.width = Math.max(0, p1.hp) + '%';

            uiElements.p2Angle.innerText = p2.angle;
            uiElements.p2Power.innerText = p2.power;
            uiElements.p2Hp.style.width = Math.max(0, p2.hp) + '%';

            uiElements.turn.innerText = currentTurn === 1 ? "Sıra: MAVİ" : "Sıra: KIRMIZI";
            uiElements.turn.style.color = currentTurn === 1 ? "#00e5ff" : "#ff1744";
        }

        function endGame() {
            gameState = 'gameover';
            let winner = p1.hp > 0 ? "MAVİ TAKIM" : "KIRMIZI TAKIM";
            let color = p1.hp > 0 ? "#00e5ff" : "#ff1744";
            uiElements.msg.innerHTML = `<span style="color:${color}">${winner} KAZANDI!</span><br><span style='font-size:20px;color:#fff'>Tekrar oynamak için tıkla</span>`;
            uiElements.msg.style.display = 'block';
        }

        uiElements.msg.addEventListener('click', initGame);

        // --- ÇİZİM ---
        function draw() {
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            }

            // Yıldızlar/Arkaplan deseni
            ctx.fillStyle = '#1f2833';
            for (let i = 0; i < 100; i += 20) { ctx.fillRect(i * 15 % width, (i * 34) % height, 2, 2); }

            // Zemin Çizimi
            ctx.fillStyle = '#45a29e';
            ctx.beginPath();
            ctx.moveTo(0, height);
            for (let i = 0; i < width; i++) {
                ctx.lineTo(i, terrain[i]);
            }
            ctx.lineTo(width, height);
            ctx.closePath();
            ctx.fill();
            // Zemin üst çizgisi
            ctx.strokeStyle = '#66fcf1';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Oyuncular
            if (p1 && p1.hp > 0) p1.draw();
            if (p2 && p2.hp > 0) p2.draw();

            // İzler
            trails.forEach(t => {
                ctx.fillStyle = t.color;
                ctx.globalAlpha = t.life;
                ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Mermi
            if (projectile) {
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = projectile.color;
                ctx.beginPath(); ctx.arc(projectile.x, projectile.y, 5, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Partiküller
            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';

            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>

</html>
