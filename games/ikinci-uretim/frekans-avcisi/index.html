<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frekans Avcısı - Sinyal Rezonansı</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020804;
            /* Osiloskop koyu yeşili */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            color: #0f0;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            text-shadow: 0 0 10px #0f0;
        }

        .panel {
            background: rgba(0, 20, 0, 0.6);
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 5px;
        }

        .target-panel {
            border-color: #00ffff;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        #resonance-container {
            width: 100%;
            height: 20px;
            border: 2px solid #0f0;
            margin-top: 10px;
            position: relative;
        }

        #resonance-bar {
            height: 100%;
            width: 0%;
            background: #0f0;
            transition: width 0.1s;
            box-shadow: 0 0 15px #0f0;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            text-align: center;
            text-shadow: 0 0 20px #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border: 2px solid #0f0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            z-index: 30;
        }

        .btn-start {
            background: #0f0;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Mobil Kontroller */
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: auto;
            z-index: 20;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid rgba(0, 255, 0, 0.4);
            color: #0f0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .btn:active {
            background: rgba(0, 255, 0, 0.4);
            box-shadow: 0 0 15px #0f0;
        }

        @media (min-width: 768px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="panel">
                <h2>SENİN SİNYALİN</h2>
                <div>Genlik (W/S): <span id="p-amp">50</span></div>
                <div>Frekans (A/D): <span id="p-freq">0.020</span></div>
                <div id="resonance-container">
                    <div id="resonance-bar"></div>
                </div>
                <div style="font-size:12px; margin-top:5px;">Sinyal Eşleşmesi %<span id="match-pct">0</span></div>
            </div>
            <div class="panel target-panel">
                <h2>HEDEF SİNYAL</h2>
                <div>Seviye: <span id="level-disp">1</span></div>
                <div style="font-size:12px; margin-top:5px; opacity:0.7;">Bilinmeyen Kaynak...</div>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="control-group">
            <div style="text-shadow: 0 0 5px #0f0;">GENLİK</div>
            <div class="btn" id="btn-amp-up">▲</div>
            <div class="btn" id="btn-amp-down">▼</div>
        </div>
        <div class="control-group" style="justify-content: flex-end;">
            <div style="text-shadow: 0 0 5px #0f0;">FREKANS</div>
            <div class="control-row">
                <div class="btn" id="btn-freq-down">◀</div>
                <div class="btn" id="btn-freq-up">▶</div>
            </div>
        </div>
    </div>

    <div id="message">
        <div id="msg-title">SİNYAL YAKALAYICI</div>
        <div id="msg-desc" style="font-size: 16px;">Sinyalleri üst üste getir ve rezonansı sağla. (Ses açın!)</div>
        <button class="btn-start" onclick="startGame()">SİSTEMİ BAŞLAT</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = {
            pAmp: document.getElementById('p-amp'),
            pFreq: document.getElementById('p-freq'),
            resBar: document.getElementById('resonance-bar'),
            matchPct: document.getElementById('match-pct'),
            level: document.getElementById('level-disp'),
            msg: document.getElementById('message'),
            msgTitle: document.getElementById('msg-title')
        };

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- SES MOTORU (Web Audio API) ---
        let audioCtx, targetOsc, playerOsc, masterGain;
        let isAudioInit = false;

        function initAudio() {
            if (isAudioInit) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.15; // Genel ses seviyesi düşük, rahatsız etmemesi için
            masterGain.connect(audioCtx.destination);

            targetOsc = audioCtx.createOscillator();
            targetOsc.type = 'sine';
            targetOsc.connect(masterGain);
            targetOsc.start();

            playerOsc = audioCtx.createOscillator();
            playerOsc.type = 'sawtooth'; // Kullanıcı sinyali biraz daha farklı tınlasın
            playerOsc.connect(masterGain);
            playerOsc.start();

            isAudioInit = true;
        }

        function updateAudio() {
            if (!isAudioInit) return;
            // Görsel frekansı duyulabilir ses frekansına çevir (Örn: 0.01 -> 200Hz, 0.05 -> 600Hz)
            let baseFreq = 200;
            let targetHz = baseFreq + (target.freq * 10000);
            let playerHz = baseFreq + (player.freq * 10000);

            targetOsc.frequency.setTargetAtTime(targetHz, audioCtx.currentTime, 0.1);
            playerOsc.frequency.setTargetAtTime(playerHz, audioCtx.currentTime, 0.1);

            // Yaklaştıkça sesleri saf Sine wave'e dönüştür ve armonik yap
            let match = parseFloat(ui.matchPct.innerText);
            if (match > 90) {
                playerOsc.type = 'sine';
            } else {
                playerOsc.type = 'sawtooth'; // Uyumsuzken (dissonance) parazitli hissettirsin
            }
        }

        function playSuccessChime() {
            if (!isAudioInit) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1); // C#6
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.2); // E6
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- OYUN MANTIĞI ---
        let gameState = 'menu';
        let level = 1;
        let time = 0;
        let resonance = 0;
        let backgroundFlash = 0;

        const target = { freq: 0.02, amp: 100 };
        const player = { freq: 0.01, amp: 50 };

        function randomizeTarget() {
            // Frekans aralığı: 0.010 - 0.050, Genlik aralığı: 30 - 200
            target.freq = (Math.floor(Math.random() * 40) + 10) / 1000;
            target.amp = Math.floor(Math.random() * 170) + 30;
            resonance = 0;
            level++;
            ui.level.innerText = level;
        }

        function startGame() {
            initAudio();
            audioCtx.resume();
            ui.msg.style.display = 'none';
            gameState = 'playing';
            level = 0;
            randomizeTarget();
        }

        // --- GİRDİ (KONTROLLER) ---
        const keys = { w: false, s: false, a: false, d: false, up: false, down: false, left: false, right: false };

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        const bindBtn = (id, k1, k2) => {
            let el = document.getElementById(id);
            el.addEventListener('touchstart', e => { e.preventDefault(); keys[k1] = true; keys[k2] = true; });
            el.addEventListener('touchend', e => { e.preventDefault(); keys[k1] = false; keys[k2] = false; });
        };
        bindBtn('btn-amp-up', 'w', 'arrowup'); bindBtn('btn-amp-down', 's', 'arrowdown');
        bindBtn('btn-freq-down', 'a', 'arrowleft'); bindBtn('btn-freq-up', 'd', 'arrowright');

        // --- GÜNCELLEME VE ÇİZİM ---
        function update() {
            if (gameState !== 'playing') return;

            // Oyuncu Sinyal Kontrolleri
            if ((keys.w || keys.arrowup) && player.amp < 300) player.amp += 1;
            if ((keys.s || keys.arrowdown) && player.amp > 10) player.amp -= 1;
            if ((keys.d || keys.arrowright) && player.freq < 0.1) player.freq += 0.0002;
            if ((keys.a || keys.arrowleft) && player.freq > 0.005) player.freq -= 0.0002;

            time += 2; // Dalga hızı

            // Eşleşme Hesaplama
            let freqDiff = Math.abs(target.freq - player.freq) / target.freq; // Yüzdelik sapma
            let ampDiff = Math.abs(target.amp - player.amp) / target.amp;

            // Hassasiyet (Tolerans)
            let matchScore = 100 - ((freqDiff * 100) + (ampDiff * 100) * 0.5);
            matchScore = Math.max(0, Math.min(100, matchScore));
            ui.matchPct.innerText = matchScore.toFixed(0);

            if (matchScore > 95) {
                resonance += 1;
                ui.resBar.style.background = '#fff';
                ui.resBar.style.boxShadow = '0 0 20px #fff';
            } else {
                resonance = Math.max(0, resonance - 0.5);
                ui.resBar.style.background = '#0f0';
                ui.resBar.style.boxShadow = '0 0 10px #0f0';
            }

            ui.resBar.style.width = Math.min(100, resonance) + '%';

            updateAudio();

            // Seviye Geçişi
            if (resonance >= 100) {
                playSuccessChime();
                backgroundFlash = 1.0;
                randomizeTarget();
            }

            // Arkaplan Flash efekti (Azalma)
            if (backgroundFlash > 0) backgroundFlash -= 0.05;

            // UI Güncelleme
            ui.pAmp.innerText = player.amp.toFixed(0);
            ui.pFreq.innerText = player.freq.toFixed(4);
        }

        function drawWave(ctx, freq, amp, phase, color, glow, isDashed) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = glow ? 4 : 2;
            ctx.shadowBlur = glow ? 20 : 0;
            ctx.shadowColor = color;
            if (isDashed) ctx.setLineDash([10, 15]); else ctx.setLineDash([]);

            let centerY = height / 2;
            for (let x = 0; x < width; x += 5) {
                let y = centerY + Math.sin((x + phase) * freq) * amp;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.setLineDash([]);
        }

        function draw() {
            // Osiloskop Arkaplanı
            ctx.fillStyle = `rgba(2, 8, 4, 0.4)`; // Motion blur efekti için
            ctx.fillRect(0, 0, width, height);

            if (backgroundFlash > 0) {
                ctx.fillStyle = `rgba(0, 255, 255, ${backgroundFlash})`;
                ctx.fillRect(0, 0, width, height);
            }

            // Izgara (Grid)
            ctx.strokeStyle = '#041a08';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x < width; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = 0; y < height; y += 50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            // Merkez Çizgileri
            ctx.strokeStyle = '#0a3311';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, height / 2); ctx.lineTo(width, height / 2);
            ctx.moveTo(width / 2, 0); ctx.lineTo(width / 2, height);
            ctx.stroke();

            if (gameState === 'playing') {
                // Hedef Sinyal (Mavi/Camgöbeği, Kesikli çizgi)
                drawWave(ctx, target.freq, target.amp, time * 0.5, 'rgba(0, 255, 255, 0.5)', false, true);

                // Oyuncu Sinyali (Parlak Neon Yeşil)
                // Eşleşme arttıkça oyuncu sinyali beyaza dönüp parlasın
                let match = parseFloat(ui.matchPct.innerText);
                let pColor = match > 95 ? '#ffffff' : '#00ff00';
                drawWave(ctx, player.freq, player.amp, time * 0.5, pColor, true, false);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
