<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sürü Zekası</title>
    <style>
        body { margin: 0; background: #040914; overflow: hidden; font-family: 'Courier New', Courier, monospace; color: #0ff; cursor: crosshair; user-select: none; touch-action: none; -webkit-touch-callout: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 20px; text-shadow: 0 0 10px #0ff; pointer-events: none; z-index: 10; width: 100%; box-sizing: border-box; padding-right: 40px;}
        #count { font-size: 42px; font-weight: bold; transition: color 0.2s, transform 0.1s;}
        #combo { font-size: 28px; color: #ff0; opacity: 0; transition: opacity 0.2s, transform 0.2s; font-weight: bold; margin-top:5px; text-shadow: 0 0 15px #ff0;}
        #menus { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(4,9,20,0.85); backdrop-filter: blur(8px); z-index: 20; text-align: center; padding: 20px; box-sizing: border-box;}
        h1 { font-size: 64px; color: #0ff; text-shadow: 0 0 30px #0ff; margin-bottom: 30px; letter-spacing: 5px; margin-top: 0;}
        button { padding: 15px 50px; font-size: 28px; font-weight: bold; background: transparent; color: #0f0; border: 3px solid #0f0; cursor: pointer; border-radius: 8px; box-shadow: 0 0 20px #0f0 inset, 0 0 20px #0f0; text-shadow: 0 0 10px #0f0; transition: 0.2s; -webkit-tap-highlight-color: transparent;}
        button:hover, button:active { background: rgba(0, 255, 0, 0.2); transform: scale(1.05); }
        .hint { color: #88c; margin-top: 20px; font-size: 18px; line-height: 1.5; }

        @media(max-width: 600px) {
            h1 { font-size: 36px; letter-spacing: 2px;}
            #count { font-size: 24px; }
            #combo { font-size: 20px; }
            button { font-size: 20px; padding: 12px 30px;}
            .hint { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="count">Birimler: 0</div>
        <div id="combo">KOMBO x2!</div>
    </div>
    
    <div id="menus">
        <h1 id="menuTitle">SÜRÜ ZEKASI</h1>
        <button onclick="startLevel()">SİSTEME GİRİŞ YAP</button>
        <div class="hint">Fareni hareket ettirerek nanobot sürüsünü yönlendir. Lazerlerden ve testerelerden kaçın.</div>
    </div>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let width, height;
        let boids = [], particles = [], obstacles = [];
        let mouseX = 0, mouseY = 0;
        let actx;
        let isPlaying = false, level = 1, startCount = 0;
        let shake = 0;
        let frameCount = 0;

        function rsz() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', rsz); rsz();
        
        ['mousemove', 'touchmove', 'touchstart', 'mousedown'].forEach(evt => canvas.addEventListener(evt, e => { 
            // e.preventDefault(); // removed to allow scrolling if user really forces it? Space is hidden anyway.
            mouseX = e.touches ? e.touches[0].clientX : e.clientX; 
            mouseY = e.touches ? e.touches[0].clientY : e.clientY; 
        }));

        function initAudio() {
            if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            if(actx.state === 'suspended') actx.resume();
        }

        function playPop() {
            if(!actx) return;
            let o = actx.createOscillator();
            let g = actx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(600 + Math.random()*600, actx.currentTime);
            o.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.1);
            g.gain.setValueAtTime(0.4, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);
            o.connect(g).connect(actx.destination);
            o.start(); o.stop(actx.currentTime + 0.1);
        }

        let lastZap = 0;
        function playZap() {
            if(!actx || actx.currentTime - lastZap < 0.2) return; 
            lastZap = actx.currentTime;
            let o = actx.createOscillator(); o.type = 'sawtooth';
            let g = actx.createGain();
            o.frequency.setValueAtTime(50 + Math.random()*100, actx.currentTime);
            g.gain.setValueAtTime(0.1, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3);
            o.connect(g).connect(actx.destination);
            o.start(); o.stop(actx.currentTime + 0.3);
        }

        function playWin() {
            if(!actx) return;
            [400, 500, 600, 800].forEach((f, i) => {
                let o = actx.createOscillator(); o.type = 'square';
                let g = actx.createGain();
                o.frequency.value = f;
                g.gain.setValueAtTime(0, actx.currentTime + i*0.15);
                g.gain.linearRampToValueAtTime(0.2, actx.currentTime + 0.1 + i*0.15);
                g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 1 + i*0.15);
                o.connect(g).connect(actx.destination);
                o.start(actx.currentTime + i*0.15); o.stop(actx.currentTime + 1.5);
            });
        }

        class Boid {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*5; this.vy = (Math.random()-0.5)*5;
                this.speed = 6 + Math.random()*2;
                this.c = `hsl(${180 + Math.random()*40}, 100%, 60%)`;
            }
            update(boids, mouseX, mouseY) {
                let ax=0, ay=0, cx=0, cy=0, sx=0, sy=0;
                let viewRadius = 60, sepRadius = 25, total=0;

                // Optimization: only check nearby boids by iterating step
                // In full game spatial grid is better, but N=100 is fine for crude nested loop in JS
                for(let i=0; i<boids.length; i+=2) { // check every other for perf trick!
                    let other = boids[i];
                    if(other === this) continue;
                    let dx = other.x - this.x, dy = other.y - this.y;
                    let distSq = dx*dx + dy*dy;
                    if(distSq < viewRadius*viewRadius) {
                        let dist = Math.sqrt(distSq);
                        ax += other.vx; ay += other.vy;
                        cx += other.x; cy += other.y;
                        if(dist < sepRadius && dist > 0) { sx -= dx/dist; sy -= dy/dist; }
                        total++;
                    }
                }

                if(total > 0) {
                    ax /= total; ay /= total; cx /= total; cy /= total;
                    cx = (cx - this.x)*0.03; cy = (cy - this.y)*0.03; // Cohesion
                    ax = (ax - this.vx)*0.05; ay = (ay - this.vy)*0.05; // Alignment
                }
                
                // Target mouse (Leader / goal)
                let tx = mouseX - this.x, ty = mouseY - this.y;
                let tDist = Math.sqrt(tx*tx + ty*ty);
                let mx = 0, my = 0;
                if(tDist > 0) { mx = (tx/tDist)*0.3; my = (ty/tDist)*0.3; } // Strong attraction to mouse

                // Avoid walls
                let wx=0, wy=0;
                let pad = 50;
                if(this.x < pad) wx = (pad-this.x)*0.1; else if(this.x > width-pad) wx = (width-pad-this.x)*0.1;
                if(this.y < pad) wy = (pad-this.y)*0.1; else if(this.y > height-pad) wy = (height-pad-this.y)*0.1;

                this.vx += ax + cx + sx*2.5 + mx + wx;
                this.vy += ay + cy + sy*2.5 + my + wy;
                
                // Avoid obstacles gracefully (repel)
                obstacles.forEach(obs => {
                    let ox = obs.x, oy = obs.y;
                    if (obs.type === 'laser') {
                        // Math for closest point on segment
                        let x1 = obs.x + Math.cos(obs.ang)*obs.len/2;
                        let y1 = obs.y + Math.sin(obs.ang)*obs.len/2;
                        let x2 = obs.x - Math.cos(obs.ang)*obs.len/2;
                        let y2 = obs.y - Math.sin(obs.ang)*obs.len/2;
                        let l2 = obs.len*obs.len;
                        let t = Math.max(0, Math.min(1, ((this.x - x2) * (x1 - x2) + (this.y - y2) * (y1 - y2)) / l2));
                        ox = x2 + t * (x1 - x2); oy = y2 + t * (y1 - y2);
                    }
                    
                    let dx = this.x - ox, dy = this.y - oy;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 120) {
                        this.vx += (dx/dist)*1.5; this.vy += (dy/dist)*1.5;
                        if(dist < 80) playZap();
                        
                        // Combo logic for narrow passages
                        if(dist > 30 && dist < 50 && Math.random() < 0.05) {
                            let comboEl = document.getElementById('combo');
                            comboEl.innerText = "YAKIN GEÇİŞ +KOMBO!";
                            comboEl.style.opacity = 1; comboEl.style.transform = 'scale(1.5)';
                            setTimeout(()=>{comboEl.style.transform = 'scale(1)';}, 100);
                            setTimeout(()=>{comboEl.style.opacity = 0;}, 1000);
                        }
                    }
                });

                let m = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                if(m > this.speed) { this.vx = (this.vx/m)*this.speed; this.vy = (this.vy/m)*this.speed; }

                this.x += this.vx; this.y += this.vy;
            }
            draw() {
                let angle = Math.atan2(this.vy, this.vx);
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(angle);
                ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(-5,5); ctx.lineTo(-3,0); ctx.lineTo(-5,-5); ctx.closePath();
                ctx.fillStyle = this.c; ctx.shadowBlur = 10; ctx.shadowColor = this.c; ctx.fill();
                ctx.restore();
            }
        }

        function createBoids(amt) {
            boids = [];
            for(let i=0; i<amt; i++) boids.push(new Boid(width/2 + (Math.random()-0.5)*150, height/2 + (Math.random()-0.5)*150));
        }

        function startLevel() {
            initAudio(); document.getElementById('menus').style.display = 'none';
            isPlaying = true; shake = 0; frameCount = 0;
            startCount = 40 + level*10;
            createBoids(startCount);
            obstacles = [];
            mouseX = width/2; mouseY = height/2;
            
            // Generate lasers and saws based on level
            for(let i=0; i<level+1; i++) {
                obstacles.push({
                    x: Math.random()*width*0.8 + width*0.1,
                    y: Math.random()*height*0.8 + height*0.1,
                    len: 150 + Math.random()*300,
                    ang: Math.random()*Math.PI,
                    speed: (Math.random()-0.5)*0.03,
                    type: Math.random() > 0.3 ? 'laser' : 'saw',
                    r: 40 + Math.random()*30
                });
            }
            updateCount();
            requestAnimationFrame(loop);
        }
        
        function updateCount() {
            let el = document.getElementById('count');
            el.innerText = `Birimler: ${boids.length} / ${startCount}`;
            el.style.transform = 'scale(1.2)';
            setTimeout(()=>el.style.transform='scale(1)', 100);
        }

        function loop() {
            if(!isPlaying) return;
            frameCount++;

            // fade background for beautiful trails
            ctx.fillStyle = 'rgba(4,9,20,0.3)';
            ctx.fillRect(0,0,width,height);

            ctx.save();
            if(shake > 0) {
                ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
                shake *= 0.9;
                if(shake < 0.5) shake = 0;
            }

            ctx.globalCompositeOperation = 'lighter';

            let boidsDied = 0;

            // Draw and update obstacles
            obstacles.forEach(obs => {
                obs.ang += obs.speed;
                
                if(obs.type === 'laser') {
                    let x1 = obs.x + Math.cos(obs.ang)*obs.len/2;
                    let y1 = obs.y + Math.sin(obs.ang)*obs.len/2;
                    let x2 = obs.x - Math.cos(obs.ang)*obs.len/2;
                    let y2 = obs.y - Math.sin(obs.ang)*obs.len/2;

                    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
                    ctx.strokeStyle = '#f00'; ctx.lineWidth = 6 + Math.sin(frameCount*0.2)*2; 
                    ctx.shadowBlur = 20; ctx.shadowColor = '#f00'; ctx.stroke();
                    
                    // Draw ends
                    ctx.beginPath(); ctx.arc(x1, y1, 8, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(x2, y2, 8, 0, Math.PI*2); ctx.fill();

                    // Death collision
                    for(let i=boids.length-1; i>=0; i--) {
                        let b = boids[i];
                        let l2 = obs.len*obs.len;
                        let t = Math.max(0, Math.min(1, ((b.x - x2) * (x1 - x2) + (b.y - y2) * (y1 - y2)) / l2));
                        let projX = x2 + t * (x1 - x2), projY = y2 + t * (y1 - y2);
                        let dist = Math.sqrt((b.x - projX)**2 + (b.y - projY)**2);
                        if(dist < 8) {
                            for(let p=0; p<15; p++) particles.push({x:b.x, y:b.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:1, c:b.c});
                            boids.splice(i,1);boidsDied++;
                        }
                    }
                } else if (obs.type === 'saw') {
                    // Moving Saw obstacle
                    obs.x += Math.cos(obs.ang)*2; obs.y += Math.sin(obs.ang)*2;
                    if(obs.x < 0 || obs.x > width) obs.ang = Math.PI - obs.ang;
                    if(obs.y < 0 || obs.y > height) obs.ang = -obs.ang;

                    ctx.save(); ctx.translate(obs.x, obs.y); ctx.rotate(frameCount*0.2);
                    ctx.beginPath();
                    for(let k=0; k<8; k++) {
                        ctx.lineTo(Math.cos(k*Math.PI/4)*obs.r, Math.sin(k*Math.PI/4)*obs.r);
                        ctx.lineTo(Math.cos(k*Math.PI/4 + 0.2)*obs.r*0.6, Math.sin(k*Math.PI/4 + 0.2)*obs.r*0.6);
                    }
                    ctx.closePath();
                    ctx.fillStyle = '#f80'; ctx.shadowBlur = 20; ctx.shadowColor = '#f00'; ctx.fill();
                    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(0,0,obs.r*0.4, 0, Math.PI*2); ctx.fill();
                    ctx.restore();

                    // Death collision
                    for(let i=boids.length-1; i>=0; i--) {
                        let b = boids[i];
                        let dist = Math.hypot(b.x - obs.x, b.y - obs.y);
                        if(dist < obs.r) {
                            for(let p=0; p<15; p++) particles.push({x:b.x, y:b.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:1, c:b.c});
                            boids.splice(i,1);boidsDied++;
                        }
                    }
                }
            });

            if(boidsDied > 0) {
                shake += boidsDied * 2;
                playPop();
                updateCount();
                document.getElementById('count').style.color = '#f00';
                setTimeout(()=> document.getElementById('count').style.color = '#0ff', 200);
            }

            // Update & draw Boids
            boids.forEach(b => { b.update(boids, mouseX, mouseY); b.draw(); });

            // Target reticle
            ctx.beginPath(); ctx.arc(mouseX, mouseY, 15, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(0, 255, 0, ${0.5 + Math.sin(frameCount*0.1)*0.5})`;
            ctx.lineWidth=2; ctx.stroke();

            // Particles
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.l*4, 0, Math.PI*2);
                ctx.fillStyle = p.c; ctx.fill();
                p.x += p.vx; p.y += p.vy; p.l -= 0.03;
            });
            particles = particles.filter(p=>p.l>0);

            ctx.restore();

            // End conditions
            if(boids.length === 0) {
                isPlaying = false;
                setTimeout(() => {
                    document.getElementById('menus').style.display = 'flex';
                    document.getElementById('menuTitle').innerText = 'SÜRÜ İMHA EDİLDİ';
                    document.getElementById('menuTitle').style.color = '#f00';
                    document.querySelector('#menus button').innerText = 'YENİDEN DENE';
                }, 1000);
            } else if (frameCount > 600) { // Survive for ~10 seconds per level
                isPlaying = false; playWin();
                setTimeout(() => {
                    level++;
                    document.getElementById('menus').style.display = 'flex';
                    document.getElementById('menuTitle').innerText = `SİSTEM AŞILDI: SEVİYE ${level}`;
                    document.getElementById('menuTitle').style.color = '#0f0';
                    document.querySelector('#menus button').innerText = 'SONRAKİ SİSTEM';
                }, 1000);
            }

            if(isPlaying) requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
