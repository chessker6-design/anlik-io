<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dalga Sörfcüsü</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#020818; font-family:'Outfit',sans-serif; touch-action:none; user-select:none; }
        canvas { display:block; }
        #ui {
            position:fixed; top:0; left:0; width:100%; padding:20px 25px;
            display:flex; justify-content:space-between; align-items:flex-start;
            pointer-events:none; z-index:10;
        }
        .gp {
            background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:12px 20px;
        }
        .sv { font-size:32px; font-weight:900; color:#e0f0ff; line-height:1; }
        .sl { font-size:11px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:2px; }
        .bv { font-size:18px; font-weight:700; color:rgba(255,255,255,0.4); }
        .combo { font-size:16px; font-weight:700; color:#fbbf24; text-shadow:0 0 10px rgba(251,191,36,0.5); margin-top:4px; }

        #go {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(2,8,24,0.88); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
            flex-direction:column; align-items:center; justify-content:center; gap:12px;
        }
        #go.show { display:flex; }
        #go h1 { font-size:40px; font-weight:900; background:linear-gradient(135deg,#06b6d4,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        #go .fs { font-size:60px; font-weight:900; color:#fff; }
        #go .sub { font-size:13px; color:rgba(255,255,255,0.35); }
        .btn {
            margin-top:8px; padding:16px 50px; font-size:18px; font-weight:700; font-family:'Outfit',sans-serif;
            background:linear-gradient(135deg,#0891b2,#2563eb); color:#fff; border:none; border-radius:50px;
            cursor:pointer; box-shadow:0 0 30px rgba(8,145,178,0.4); transition:transform 0.15s;
        }
        .btn:active { transform:scale(0.94); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="gp">
            <div class="sl">Skor</div>
            <div class="sv" id="sc">0</div>
            <div class="combo" id="comboEl"></div>
        </div>
        <div class="gp" style="text-align:right">
            <div class="sl">En İyi</div>
            <div class="bv" id="bst">0</div>
        </div>
    </div>
    <div id="go">
        <h1>DALGA KIRILDI</h1>
        <div class="fs" id="fsc">0</div>
        <div class="sub">puan toplandı</div>
        <button class="btn" onclick="restart()">Tekrar Sörf Yap</button>
    </div>
    <canvas id="c"></canvas>

    <script>
    const C=document.getElementById('c'), $=C.getContext('2d');
    let W, H;
    function resize() { W=C.width=innerWidth; H=C.height=innerHeight; }
    resize(); addEventListener('resize', resize);

    let ac;
    function initA() { if(ac)return; ac=new(AudioContext||webkitAudioContext)(); }
    function snd(t){
        if(!ac||ac.state==='suspended')return;
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
        if(t==='gem'){
            o.type='sine';
            const f=[523,659,784,880][Math.floor(Math.random()*4)];
            o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*1.5,n+0.15);
            g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.15);
            o.start(n);o.stop(n+0.15);
        } else if(t==='die'){
            o.type='sawtooth';o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(20,n+0.5);
            g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.5);
            o.start(n);o.stop(n+0.5);
        } else if(t==='combo'){
            o.type='triangle';o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(1200,n+0.2);
            g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.3);
            o.start(n);o.stop(n+0.3);
        }
    }

    // Wave generation
    let waves = [];
    const WAVE_LAYERS = 3;
    function generateWave(layer) {
        let pts = [];
        let segments = 80;
        let amp = 30 + layer*15;
        let freq = 0.015 - layer*0.003;
        for(let i=0; i<=segments; i++) {
            pts.push({ phase: i * (W/segments) * freq, amp: amp + Math.random()*10 });
        }
        return { pts, baseY: H*0.55 + layer*40, speed: 1.5 - layer*0.3, offset: 0, layer };
    }

    let player, gems, obstacles, particles, score, best, dead, combo, comboTimer, time, holding;

    best = +localStorage.getItem('waveBest') || 0;
    document.getElementById('bst').textContent = best;

    function init() {
        waves = [];
        for(let i=0; i<WAVE_LAYERS; i++) waves.push(generateWave(i));
        player = { x: W*0.25, y: H*0.45, vy: 0, size: 14, onWave: false };
        gems = []; obstacles = []; particles = [];
        score = 0; dead = false; combo = 0; comboTimer = 0; time = 0; holding = false;
        document.getElementById('sc').textContent = '0';
        document.getElementById('comboEl').textContent = '';
        document.getElementById('go').classList.remove('show');
        spawnGems();
    }

    function spawnGems() {
        for(let i=0; i<6; i++) {
            gems.push({
                x: W + Math.random()*W*2 + i*200,
                y: H*0.2 + Math.random()*(H*0.3),
                size: 10, glow: 0
            });
        }
        for(let i=0; i<3; i++) {
            obstacles.push({
                x: W + 300 + Math.random()*W + i*350,
                y: 0, w: 25, isTop: Math.random()>0.5
            });
        }
    }

    init();

    addEventListener('pointerdown', () => { initA(); holding=true; });
    addEventListener('pointerup', () => { holding=false; });
    addEventListener('keydown', (e) => { if(e.code==='Space'){initA();holding=true;} });
    addEventListener('keyup', (e) => { if(e.code==='Space') holding=false; });

    function getWaveY(waveIdx, x) {
        let w = waves[waveIdx];
        let val = 0;
        val += Math.sin((x*0.012) + w.offset) * 35;
        val += Math.sin((x*0.025) + w.offset*1.3) * 18;
        val += Math.sin((x*0.006) + w.offset*0.7) * 25;
        return w.baseY + val;
    }

    function update(dt) {
        if(dead) return;
        time += dt * 0.016;
        let spd = 3 + score*0.008;

        // Waves
        for(let w of waves) w.offset += w.speed * dt * 0.03;

        // Player physics
        if(holding) player.vy -= 0.35 * dt;
        else player.vy += 0.25 * dt;
        player.vy *= 0.96;
        player.y += player.vy * dt;

        // Wave surface collision (main wave)
        let surfY = getWaveY(0, player.x);
        if(player.y > surfY - 5) {
            player.y = surfY - 5;
            player.vy = -2;
            player.onWave = true;
            // Spray particles
            if(Math.random() > 0.6) {
                particles.push({
                    x:player.x, y:player.y+5,
                    vx:(Math.random()-0.5)*3, vy:-Math.random()*5-2,
                    life:1, color:'rgba(150,220,255,', size:Math.random()*3+1
                });
            }
        } else { player.onWave = false; }

        // Ceiling / floor death
        if(player.y < -30 || player.y > H+30) die();

        // Gems
        for(let i=gems.length-1; i>=0; i--) {
            let ge = gems[i];
            ge.x -= spd * dt;
            ge.glow = (Math.sin(time*5+i)*0.5+0.5);
            let dx = player.x-ge.x, dy = player.y-ge.y;
            if(Math.sqrt(dx*dx+dy*dy) < player.size + ge.size) {
                combo++; comboTimer = 120;
                let pts = 10 * Math.max(1, combo);
                score += pts;
                document.getElementById('sc').textContent = score;
                if(combo >= 3) { snd('combo'); document.getElementById('comboEl').textContent = combo+'x KOMBO!'; }
                else { snd('gem'); document.getElementById('comboEl').textContent = ''; }
                for(let j=0;j<10;j++) particles.push({
                    x:ge.x,y:ge.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
                    life:1, color:'rgba(251,191,36,', size:Math.random()*4+2
                });
                gems.splice(i,1);
            }
            if(ge.x < -20) { gems.splice(i,1); combo=0; document.getElementById('comboEl').textContent=''; }
        }

        // Obstacles
        for(let i=obstacles.length-1; i>=0; i--) {
            let ob = obstacles[i];
            ob.x -= spd * dt;
            let obH = 120 + score*0.2;
            let obY = ob.isTop ? 0 : H - obH;
            if(player.x+player.size > ob.x && player.x-player.size < ob.x+ob.w &&
               player.y+player.size > obY && player.y-player.size < obY+obH) die();
            if(ob.x < -40) obstacles.splice(i,1);
        }

        // Respawn
        if(gems.length < 3) {
            for(let i=0;i<4;i++) gems.push({ x:W+100+i*180+Math.random()*100, y:H*0.15+Math.random()*(H*0.35), size:10, glow:0 });
        }
        if(obstacles.length < 2) {
            for(let i=0;i<2;i++) obstacles.push({ x:W+200+i*400+Math.random()*200, y:0, w:25, isTop:Math.random()>0.5 });
        }

        // Combo timer
        if(comboTimer > 0) { comboTimer -= dt; if(comboTimer <= 0) { combo = 0; document.getElementById('comboEl').textContent=''; } }

        // Particles
        for(let i=particles.length-1;i>=0;i--) {
            let p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.1*dt; p.life-=0.02*dt;
            if(p.life<=0) particles.splice(i,1);
        }
    }

    function die() {
        if(dead) return; dead=true; snd('die');
        for(let i=0;i<50;i++) particles.push({
            x:player.x, y:player.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15,
            life:1, color:'rgba(255,100,100,', size:Math.random()*5+2
        });
        if(score>best){best=score;localStorage.setItem('waveBest',best);document.getElementById('bst').textContent=best;}
        document.getElementById('fsc').textContent=score;
        setTimeout(()=>document.getElementById('go').classList.add('show'),600);
    }

    function restart() { init(); }

    function draw() {
        // Sky gradient
        let sky = $.createLinearGradient(0,0,0,H);
        sky.addColorStop(0, '#020818');
        sky.addColorStop(0.5, '#0c1445');
        sky.addColorStop(1, '#1a1040');
        $.fillStyle=sky; $.fillRect(0,0,W,H);

        // Stars
        $.fillStyle='rgba(255,255,255,0.3)';
        for(let i=0;i<30;i++) {
            let sx=(i*137.5+time*10)%W, sy=(i*97.3)%H*0.4;
            $.fillRect(sx,sy, 1.5, 1.5);
        }

        // Draw wave layers back to front
        for(let l=WAVE_LAYERS-1; l>=0; l--) {
            let alpha = 0.15 + l*0.15;
            let hue = 200 + l*20;
            $.beginPath();
            $.moveTo(0, H);
            for(let x=0; x<=W; x+=4) {
                $.lineTo(x, getWaveY(l, x));
            }
            $.lineTo(W, H);
            $.closePath();
            let wg = $.createLinearGradient(0, H*0.4, 0, H);
            wg.addColorStop(0, `hsla(${hue},70%,40%,${alpha})`);
            wg.addColorStop(1, `hsla(${hue+20},60%,15%,${alpha+0.1})`);
            $.fillStyle=wg; $.fill();

            // Wave line glow
            if(l===0) {
                $.beginPath();
                for(let x=0;x<=W;x+=4) {
                    let y=getWaveY(0,x);
                    if(x===0)$.moveTo(x,y); else $.lineTo(x,y);
                }
                $.strokeStyle='rgba(100,200,255,0.4)'; $.lineWidth=2; $.stroke();
                $.strokeStyle='rgba(100,200,255,0.15)'; $.lineWidth=6; $.stroke();
            }
        }

        // Obstacles
        for(let ob of obstacles) {
            let obH = 120 + score*0.2;
            let obY = ob.isTop ? 0 : H - obH;
            let og = $.createLinearGradient(ob.x, obY, ob.x+ob.w, obY);
            og.addColorStop(0, 'rgba(220,40,80,0.7)');
            og.addColorStop(1, 'rgba(220,40,80,0.2)');
            $.fillStyle=og; $.fillRect(ob.x, obY, ob.w, obH);
            $.shadowColor='#dc2850'; $.shadowBlur=15;
            $.fillStyle='#dc2850';
            $.fillRect(ob.x, ob.isTop ? obH-3 : obY, ob.w, 3);
            $.shadowBlur=0;
        }

        // Gems
        for(let ge of gems) {
            $.save();
            $.translate(ge.x, ge.y);
            $.rotate(time*3);
            $.shadowColor='#fbbf24'; $.shadowBlur=15+ge.glow*10;
            $.fillStyle=`hsl(45,90%,${55+ge.glow*20}%)`;
            $.beginPath();
            $.moveTo(0,-ge.size); $.lineTo(ge.size*0.7,0); $.lineTo(0,ge.size); $.lineTo(-ge.size*0.7,0);
            $.closePath(); $.fill();
            $.shadowBlur=0;
            $.restore();
        }

        // Player
        if(!dead) {
            $.save();
            $.translate(player.x, player.y);
            // Board
            $.shadowColor='#38bdf8'; $.shadowBlur=20;
            $.fillStyle='#fff';
            $.beginPath();
            $.ellipse(0, player.size*0.5, player.size*1.2, player.size*0.3, 0, 0, Math.PI*2);
            $.fill();
            // Body
            $.fillStyle='#38bdf8';
            $.beginPath();
            $.arc(0, -2, player.size*0.7, 0, Math.PI*2);
            $.fill();
            // Head
            $.fillStyle='#fff';
            $.beginPath();
            $.arc(0, -player.size*0.8, player.size*0.35, 0, Math.PI*2);
            $.fill();
            $.shadowBlur=0;
            $.restore();
        }

        // Particles
        for(let p of particles) {
            $.globalAlpha=Math.max(0,p.life);
            $.fillStyle=p.color + Math.max(0,p.life)+')';
            $.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
        }
        $.globalAlpha=1;
    }

    let last=0;
    function loop(ts) {
        let dt=Math.min((ts-last)/16.67,3); last=ts;
        update(dt); draw();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    </script>
</body>
</html>
