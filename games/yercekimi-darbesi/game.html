<!DOCTYPE html>
<html>

<head>
    <title>Fiziksel Top Oyunu</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #canvas {
            background-color: #eee;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let topX = canvas.width / 2;
        let topY = canvas.height / 2;
        let topHiziX = 0;
        let topHiziY = 0;
        let topKütlesi = 1;
        const yercekimi = 0.5;
        const surtunme = 0.99; // Sürtünme katsayısı
        const ateşlemeMesafe = 50;

        // Mermi
        let mermiX = topX;
        let mermiY = topY;
        let mermiHizi = 20;
        let mermiVarmi = false;
        let mermiID;


        function çizTop() {
            ctx.beginPath();
            ctx.arc(topX, topY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'blue';
            ctx.fill();
            ctx.closePath();
        }

        function ateşMermi() {
            if (!mermiVarmi) {
                mermiX = topX;
                mermiY = topY;
                mermiHizi = 20;
                mermiVarmi = true;
                mermiID = setTimeout(() => {
                    mermiVarmi = false;
                }, 3000); // 3 saniye sonra mermi yok olur
            }
        }

        function çizMermi() {
            if (mermiVarmi) {
                ctx.beginPath();
                ctx.arc(mermiX, mermiY, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.closePath();
            }
        }

        function oyunDengesi() {
            // Ekranı Temizle
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Topu Güncelle (Yerçekimi)
            topHiziY += yercekimi;
            topY += topHiziY;

            // Sürtünme
            topHiziX *= surtunme;
            topHiziY *= surtunme;

            // Topun Duvarlarla Çarpışması
            if (topX - 15 > canvas.width || topX + 15 < 0) {
                topHiziX *= -1;
                topX = 15 + Math.abs(topHiziX); // Duvarlara çarptığında yönü tersine çevir
            }
            if (topY - 15 > canvas.height || topY + 15 < 0) {
                topHiziY *= -1;
                topY = 15 + Math.abs(topHiziY); // Duvarlara çarptığında yönü tersine çevir
            }

            // Mermi Güncelleme
            mermiX += mermiHizi;
            if (mermiVarmi) {
                çizMermi();
            }


            // Top ve Mermi Çarpışması
            let mesafe = Math.sqrt((topX - mermiX) * (topX - mermiX) + (topY - mermiY) * (topY - mermiY));
            if (mesafe < 15) { // Top ve merminin birbirine yakınlığı
                // Çarpışma Etkileşimi
                clearInterval(mermiID);
                mermiVarmi = false;
                çizMermi();

                // Mermiyi yok et
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Ekranı temizle
            }


            // Topu Çiz
            çizTop();

            ateşMermi();
        }

        setInterval(oyunDengesi, 20);
    </script>
</body>

</html>
