<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siber Kalkan</title>
    <style>
        body { margin: 0; overflow: hidden; background: #030a16; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: radial-gradient(circle at center, #061129, #01040a); }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        .score { font-size: 50px; font-weight: 900; color: #00e5ff; text-shadow: 0 0 20px #00e5ff; transition: transform 0.1s; }
        .game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.85); padding: 50px; border: 1px solid #ff0055; border-radius: 20px; backdrop-filter: blur(10px); box-shadow: 0 0 50px rgba(255,0,85,0.5); }
        button { background: #00e5ff; color: #000; border: none; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 5px; margin-top: 20px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(0,229,255,0.6); }
        @keyframes shake { 0% {transform: translate(5px,5px);} 20% {transform: translate(-5px,-5px);} 40% {transform: translate(-5px,5px);} 60% {transform: translate(5px,-5px);} 80% {transform: translate(5px,5px);} 100% {transform: translate(0,0);} }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>
    <div id="ui"><div class="score" id="scoreEl">0</div></div>
    <div class="game-over" id="goScreen">
        <h1 style="color:#ff0055; margin:0 0 10px 0; font-size:40px; text-shadow:0 0 15px #ff0055;">SİSTEM ELE GEÇİRİLDİ</h1>
        <p style="font-size: 24px; color:#aaa;">Bloklanan Paket: <span id="finalScore" style="color:#00e5ff; font-weight:bold;">0</span></p>
        <button onclick="resetGame()">Güvenlik Duvarını Yeniden Başlat</button>
    </div>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreEl');
        let width = canvas.width = window.innerWidth > 600 ? 500 : window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let cx = width/2, cy = height/2;
        
        // Audio
        let actx;
        function play(t) {
            if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            if(actx.state==='suspended') actx.resume();
            let o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            if(t==='deflect') { o.type='triangle'; o.frequency.setValueAtTime(600, actx.currentTime); o.frequency.linearRampToValueAtTime(1000, actx.currentTime+0.1); g.gain.setValueAtTime(0.3, actx.currentTime); }
            else if(t==='die') { o.type='square'; o.frequency.setValueAtTime(100, actx.currentTime); o.frequency.exponentialRampToValueAtTime(10, actx.currentTime+0.5); g.gain.setValueAtTime(0.5, actx.currentTime); }
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime+ (t==='die'?0.5:0.1));
            o.start(); o.stop(actx.currentTime+ (t==='die'?0.5:0.1));
        }

        let angle = 0; // shield angle
        let enemies = [], particles = [];
        let score = 0, isDead = false, speed = 2, spawnRate = 80, frame = 0;

        function createP(x,y,c, n) {
            for(let i=0;i<n;i++) particles.push({x,y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, c});
        }

        function resetGame() {
            enemies = []; particles = [];
            score = 0; scoreEl.innerText = 0;
            frame = 0; isDead = false; speed = 2; spawnRate = 80;
            document.getElementById('goScreen').style.display = 'none';
        }

        let targetAngle = 0;
        window.addEventListener('pointerdown', (e) => {
            if(!actx) play('start');
            if(e.clientX < window.innerWidth/2) targetAngle -= Math.PI/2;
            else targetAngle += Math.PI/2;
        });
        window.addEventListener('keydown', (e) => {
            if(!actx) play('start');
            if(e.key==='ArrowLeft') targetAngle -= Math.PI/2;
            if(e.key==='ArrowRight') targetAngle += Math.PI/2;
        });

        function loop() {
            requestAnimationFrame(loop);
            if(isDead) return;
            ctx.fillStyle = 'rgba(3,10,22,0.3)'; ctx.fillRect(0,0,width,height);
            
            // Core
            ctx.beginPath(); ctx.arc(cx,cy,40,0,Math.PI*2);
            ctx.fillStyle = '#00e5ff'; ctx.shadowBlur = 30; ctx.shadowColor = '#00e5ff'; ctx.fill();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Shield lerp
            angle += (targetAngle - angle) * 0.2;

            // Shield Arc
            ctx.beginPath(); ctx.arc(cx,cy,60, angle - (Math.PI/4), angle + (Math.PI/4));
            ctx.lineWidth = 15; ctx.strokeStyle = '#fff';
            ctx.lineCap = 'round'; ctx.stroke();

            // Handle Enemies
            if(frame % Math.max(20, spawnRate) === 0) {
                let startAng = Math.random() * Math.PI * 2;
                let dist = Math.max(width, height);
                enemies.push({ x: cx + Math.cos(startAng)*dist, y: cy + Math.sin(startAng)*dist, ang: startAng });
            }

            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                e.x -= Math.cos(e.ang) * speed;
                e.y -= Math.sin(e.ang) * speed;
                
                ctx.fillStyle='#ff0055'; ctx.shadowBlur=15; ctx.shadowColor='#ff0055';
                ctx.beginPath(); ctx.arc(e.x, e.y, 8, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur=0;

                let dx = e.x - cx, dy = e.y - cy;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if(dist < 75 && dist > 55) {
                    let hitAng = Math.atan2(dy, dx);
                    // normalize angles to check if within shield
                    let normShield = angle % (Math.PI*2); if(normShield < 0) normShield += Math.PI*2;
                    let normHit = hitAng % (Math.PI*2); if(normHit < 0) normHit += Math.PI*2;
                    
                    let diff = Math.abs(normShield - normHit);
                    if(diff > Math.PI) diff = Math.PI*2 - diff;
                    
                    if(diff < Math.PI/4) { // deflect
                        createP(e.x, e.y, '#fff', 15);
                        play('deflect'); score++; scoreEl.innerText = score;
                        enemies.splice(i,1); i--;
                        if(score % 5 === 0) { speed += 0.2; spawnRate -= 2; }
                        scoreEl.style.transform='scale(1.4)'; setTimeout(()=>scoreEl.style.transform='scale(1)', 100);
                        continue;
                    }
                }
                if(dist < 40) {
                    createP(cx, cy, '#ff0055', 100); play('die');
                    isDead = true; document.getElementById('goScreen').style.display='block';
                    document.getElementById('finalScore').innerText=score;
                    canvas.classList.add('shake'); setTimeout(()=>canvas.classList.remove('shake'),400);
                }
            }

            // Particles
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x+=p.vx; p.y+=p.vy; p.life-=0.03;
                ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,p.life);
                ctx.beginPath(); ctx.arc(p.x,p.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha=1;
                if(p.life<=0){particles.splice(i,1);i--;}
            }
            frame++;
        }
        loop();
    </script>
</body>
</html>
