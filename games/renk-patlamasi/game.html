<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renk Patlaması</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#0f0f18; font-family:'Outfit',sans-serif; touch-action:none; user-select:none; }
        canvas { display:block; }
        #ui {
            position:fixed; top:0; left:0; width:100%; padding:20px 25px;
            display:flex; justify-content:space-between; align-items:flex-start;
            pointer-events:none; z-index:10;
        }
        .gp {
            background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:12px 20px;
        }
        .sv { font-size:36px; font-weight:900; color:#fff; line-height:1; transition:transform 0.1s; }
        .sl { font-size:11px; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:2px; }
        .bv { font-size:18px; font-weight:700; color:rgba(255,255,255,0.4); }
        .streak { font-size:14px; font-weight:700; margin-top:4px; }

        #lives { position:fixed; top:25px; left:50%; transform:translateX(-50%); font-size:24px; pointer-events:none; z-index:10; letter-spacing:5px; }

        #go {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(15,15,24,0.9); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
            flex-direction:column; align-items:center; justify-content:center; gap:12px;
        }
        #go.show { display:flex; }
        #go h1 { font-size:38px; font-weight:900; background:linear-gradient(135deg,#f43f5e,#a855f7,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        #go .fs { font-size:60px; font-weight:900; color:#fff; }
        #go .sub { font-size:13px; color:rgba(255,255,255,0.3); }
        .btn {
            margin-top:8px; padding:16px 50px; font-size:18px; font-weight:700; font-family:'Outfit',sans-serif;
            background:linear-gradient(135deg,#ec4899,#8b5cf6); color:#fff; border:none; border-radius:50px;
            cursor:pointer; box-shadow:0 0 30px rgba(236,72,153,0.4); transition:transform 0.15s;
        }
        .btn:active { transform:scale(0.94); }

        #colorIndicator {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            display:flex; gap:12px; pointer-events:none; z-index:10;
        }
        .ci-dot {
            width:40px; height:40px; border-radius:50%; border:3px solid rgba(255,255,255,0.15);
            transition: transform 0.15s, border-color 0.15s;
        }
        .ci-dot.active { transform:scale(1.35); border-color:#fff; box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="gp">
            <div class="sl">Skor</div>
            <div class="sv" id="sc">0</div>
            <div class="streak" id="streakEl"></div>
        </div>
        <div class="gp" style="text-align:right">
            <div class="sl">En İyi</div>
            <div class="bv" id="bst">0</div>
        </div>
    </div>

    <div id="lives">❤️❤️❤️</div>

    <div id="colorIndicator">
        <div class="ci-dot" id="ci0" style="background:#f43f5e;color:#f43f5e;"></div>
        <div class="ci-dot" id="ci1" style="background:#3b82f6;color:#3b82f6;"></div>
        <div class="ci-dot" id="ci2" style="background:#22c55e;color:#22c55e;"></div>
    </div>

    <div id="go">
        <h1>RENKLER SÖNDÜ</h1>
        <div class="fs" id="fsc">0</div>
        <div class="sub">puan toplandı</div>
        <button class="btn" onclick="restart()">Tekrar Oyna</button>
    </div>
    <canvas id="c"></canvas>

    <script>
    const C=document.getElementById('c'),$=C.getContext('2d');
    let W,H;
    function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
    resize(); addEventListener('resize',resize);

    const COLORS = [
        {name:'red', h:'#f43f5e', hsl:'hsl(350,90%,62%)'},
        {name:'blue', h:'#3b82f6', hsl:'hsl(217,91%,60%)'},
        {name:'green', h:'#22c55e', hsl:'hsl(142,71%,45%)'}
    ];

    let ac;
    function initA(){if(ac)return;ac=new(AudioContext||webkitAudioContext)();}
    function snd(t,idx){
        if(!ac||ac.state==='suspended')return;
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
        if(t==='match'){
            const freqs=[523,659,784];
            o.type='sine';o.frequency.setValueAtTime(freqs[idx||0],n);
            o.frequency.exponentialRampToValueAtTime(freqs[idx||0]*1.5,n+0.12);
            g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.12);
            o.start(n);o.stop(n+0.12);
        } else if(t==='miss'){
            o.type='sawtooth';o.frequency.setValueAtTime(150,n);o.frequency.exponentialRampToValueAtTime(60,n+0.2);
            g.gain.setValueAtTime(0.25,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.2);
            o.start(n);o.stop(n+0.2);
        } else if(t==='die'){
            o.type='square';o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(20,n+0.6);
            g.gain.setValueAtTime(0.4,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.6);
            o.start(n);o.stop(n+0.6);
        } else if(t==='streak'){
            o.type='triangle';o.frequency.setValueAtTime(800,n);o.frequency.linearRampToValueAtTime(1600,n+0.15);
            g.gain.setValueAtTime(0.2,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.25);
            o.start(n);o.stop(n+0.25);
        }
    }

    let player, balls, particles, score, best, dead, lives, streak, currentColor, time, speed;
    best = +localStorage.getItem('colorBest') || 0;
    document.getElementById('bst').textContent = best;

    function init(){
        player = {x:W/2, y:H-120, size:28};
        balls=[]; particles=[];
        score=0; dead=false; lives=3; streak=0; currentColor=0; time=0; speed=3;
        document.getElementById('sc').textContent='0';
        document.getElementById('streakEl').textContent='';
        document.getElementById('lives').textContent='❤️'.repeat(3);
        document.getElementById('go').classList.remove('show');
        updateCI();
    }

    function updateCI(){
        for(let i=0;i<3;i++){
            document.getElementById('ci'+i).classList.toggle('active', i===currentColor);
        }
    }

    init();

    // Touch zones: left third, middle third, right third
    addEventListener('pointerdown',(e)=>{
        initA();
        if(dead) return;
        let rx = e.clientX / W;
        if(rx < 0.33) currentColor = 0;
        else if(rx < 0.66) currentColor = 1;
        else currentColor = 2;
        updateCI();
    });

    addEventListener('keydown',(e)=>{
        initA();
        if(dead) return;
        if(e.key==='1'||e.key==='a'||e.key==='ArrowLeft') currentColor=0;
        else if(e.key==='2'||e.key==='s'||e.key==='ArrowDown') currentColor=1;
        else if(e.key==='3'||e.key==='d'||e.key==='ArrowRight') currentColor=2;
        updateCI();
    });

    function spawnBall(){
        let ci = Math.floor(Math.random()*3);
        balls.push({
            x: Math.random()*(W-80)+40,
            y: -30,
            size: 18 + Math.random()*8,
            colorIdx: ci,
            pulse: Math.random()*Math.PI*2,
            speed: speed + Math.random()*2
        });
    }

    function update(dt){
        if(dead) return;
        time += dt*0.016;
        speed = 3 + time*0.15;

        // Spawn
        if(Math.random() < 0.03*dt*(1+time*0.05)) spawnBall();

        // Player follows color indicator
        player.x = W/2;

        // Balls
        for(let i=balls.length-1;i>=0;i--){
            let b=balls[i];
            b.y += b.speed*dt;
            b.pulse += 0.05*dt;

            // Catch zone
            if(b.y+b.size > player.y-player.size && b.y-b.size < player.y+player.size){
                if(b.colorIdx === currentColor){
                    // Match!
                    streak++;
                    let pts = 10 + streak*5;
                    score += pts;
                    document.getElementById('sc').textContent=score;
                    snd('match', b.colorIdx);
                    if(streak >= 5 && streak%5===0) { snd('streak'); document.getElementById('streakEl').innerHTML=`<span style="color:${COLORS[currentColor].h}">${streak}x SERİ!</span>`; }
                    else if(streak >= 3) document.getElementById('streakEl').innerHTML=`<span style="color:${COLORS[currentColor].h}">${streak}x</span>`;
                    for(let j=0;j<15;j++) particles.push({
                        x:b.x,y:b.y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12-3,
                        life:1,color:COLORS[b.colorIdx].h,size:Math.random()*5+2
                    });
                    balls.splice(i,1); continue;
                } else if(b.y > player.y + player.size + 5) {
                    // Wrong color passed through - miss
                    // Only penalize if ball reached bottom catch zone
                }
            }

            // Missed entirely (fell below screen)
            if(b.y > H+40){
                streak=0; document.getElementById('streakEl').textContent='';
                lives--;
                document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives));
                snd('miss');
                if(lives<=0) die();
                balls.splice(i,1);
            }
        }

        // Particles
        for(let i=particles.length-1;i>=0;i--){
            let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.15*dt;p.life-=0.025*dt;
            if(p.life<=0) particles.splice(i,1);
        }
    }

    function die(){
        if(dead)return;dead=true;snd('die');
        for(let i=0;i<60;i++) particles.push({
            x:W/2,y:H-120,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,
            life:1,color:COLORS[Math.floor(Math.random()*3)].h,size:Math.random()*6+2
        });
        if(score>best){best=score;localStorage.setItem('colorBest',best);document.getElementById('bst').textContent=best;}
        document.getElementById('fsc').textContent=score;
        setTimeout(()=>document.getElementById('go').classList.add('show'),600);
    }

    function restart(){init();}

    function draw(){
        // BG
        let bg=$.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,'#0f0f18');
        bg.addColorStop(1,'#1a1028');
        $.fillStyle=bg;$.fillRect(0,0,W,H);

        // Ambient floating dots
        $.fillStyle='rgba(255,255,255,0.03)';
        for(let i=0;i<20;i++){
            let x=(i*173+time*30)%W, y=(i*131+Math.sin(time+i)*30)%H;
            $.beginPath();$.arc(x,y,2,0,Math.PI*2);$.fill();
        }

        // Catch zone indicator
        let zoneGrad = $.createLinearGradient(0, player.y-40, 0, player.y+40);
        zoneGrad.addColorStop(0, 'rgba(0,0,0,0)');
        zoneGrad.addColorStop(0.5, COLORS[currentColor].h+'22');
        zoneGrad.addColorStop(1, 'rgba(0,0,0,0)');
        $.fillStyle=zoneGrad;
        $.fillRect(0, player.y-40, W, 80);

        // Catch line
        $.strokeStyle = COLORS[currentColor].h+'66';
        $.lineWidth = 2;
        $.setLineDash([8,8]);
        $.beginPath();$.moveTo(0,player.y);$.lineTo(W,player.y);$.stroke();
        $.setLineDash([]);

        // Balls
        for(let b of balls){
            $.save();
            $.translate(b.x,b.y);
            let pSize = 1 + Math.sin(b.pulse)*0.08;
            $.scale(pSize,pSize);

            $.shadowColor=COLORS[b.colorIdx].h;
            $.shadowBlur=20;
            $.fillStyle=COLORS[b.colorIdx].h;
            $.beginPath();$.arc(0,0,b.size,0,Math.PI*2);$.fill();

            // Inner highlight
            $.fillStyle='rgba(255,255,255,0.3)';
            $.beginPath();$.arc(-b.size*0.25,-b.size*0.25,b.size*0.3,0,Math.PI*2);$.fill();

            $.shadowBlur=0;
            $.restore();
        }

        // Particles
        for(let p of particles){
            $.globalAlpha=Math.max(0,p.life);
            $.fillStyle=p.color;
            $.beginPath();$.arc(p.x,p.y,p.size,0,Math.PI*2);$.fill();
        }
        $.globalAlpha=1;

        // Subtle scanlines
        $.fillStyle='rgba(0,0,0,0.03)';
        for(let y=0;y<H;y+=3) $.fillRect(0,y,W,1);
    }

    let last=0;
    function loop(ts){let dt=Math.min((ts-last)/16.67,3);last=ts;update(dt);draw();requestAnimationFrame(loop);}
    requestAnimationFrame(loop);
    </script>
</body>
</html>
