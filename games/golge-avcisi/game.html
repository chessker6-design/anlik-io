<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gölge Avcısı</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#000; font-family:'Outfit',sans-serif; touch-action:none; user-select:none; cursor:none; }
        canvas { display:block; }
        #ui {
            position:fixed; top:0; left:0; width:100%; padding:20px 25px;
            display:flex; justify-content:space-between; align-items:flex-start;
            pointer-events:none; z-index:10;
        }
        .gp {
            background:rgba(255,255,255,0.04); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:12px 20px;
        }
        .sv { font-size:32px; font-weight:900; color:#fef3c7; line-height:1; }
        .sl { font-size:11px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:2px; }
        .bv { font-size:18px; font-weight:700; color:rgba(255,255,255,0.35); }

        #go {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(0,0,0,0.9); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px);
            flex-direction:column; align-items:center; justify-content:center; gap:12px;
        }
        #go.show { display:flex; }
        #go h1 { font-size:38px; font-weight:900; background:linear-gradient(135deg,#fbbf24,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        #go .fs { font-size:60px; font-weight:900; color:#fff; }
        #go .sub { font-size:13px; color:rgba(255,255,255,0.3); }
        .btn {
            margin-top:8px; padding:16px 50px; font-size:18px; font-weight:700; font-family:'Outfit',sans-serif;
            background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; border:none; border-radius:50px;
            cursor:pointer; box-shadow:0 0 30px rgba(245,158,11,0.4); transition:transform 0.15s;
        }
        .btn:active { transform:scale(0.94); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="gp">
            <div class="sl">Hayatta Kalma</div>
            <div class="sv" id="sc">0.0s</div>
        </div>
        <div class="gp" style="text-align:right">
            <div class="sl">Rekor</div>
            <div class="bv" id="bst">0.0s</div>
        </div>
    </div>
    <div id="go">
        <h1>KARANLIK KAZANDI</h1>
        <div class="fs" id="fsc">0.0</div>
        <div class="sub">saniye hayatta kaldın</div>
        <button class="btn" onclick="restart()">Işığı Yeniden Yak</button>
    </div>
    <canvas id="c"></canvas>

    <script>
    const C=document.getElementById('c'),$=C.getContext('2d');
    let W,H;
    function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
    resize(); addEventListener('resize',resize);

    let ac;
    function initA(){if(ac)return;ac=new(AudioContext||webkitAudioContext)();}
    function snd(t){
        if(!ac||ac.state==='suspended')return;
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
        if(t==='orb'){
            o.type='sine';o.frequency.setValueAtTime(600,n);o.frequency.exponentialRampToValueAtTime(1200,n+0.2);
            g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.2);
            o.start(n);o.stop(n+0.2);
        } else if(t==='die'){
            o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(15,n+0.8);
            g.gain.setValueAtTime(0.5,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.8);
            o.start(n);o.stop(n+0.8);
        } else if(t==='pulse'){
            o.type='sine';o.frequency.setValueAtTime(250,n);
            g.gain.setValueAtTime(0.06,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.4);
            o.start(n);o.stop(n+0.4);
        }
    }

    let light={x:W/2,y:H/2,radius:160,targetR:160,energy:100};
    let mouseX=W/2,mouseY=H/2;
    let shadows=[],orbs=[],particles=[];
    let score=0,best=+localStorage.getItem('shadowBest')||0,dead=false,time=0;

    document.getElementById('bst').textContent=best.toFixed(1)+'s';

    function init(){
        light={x:W/2,y:H/2,radius:160,targetR:160,energy:100};
        mouseX=W/2;mouseY=H/2;
        shadows=[];orbs=[];particles=[];
        score=0;dead=false;time=0;
        document.getElementById('sc').textContent='0.0s';
        document.getElementById('go').classList.remove('show');
        document.body.style.cursor='none';
        spawnOrb();
    }

    function spawnOrb(){
        orbs.push({
            x: Math.random()*(W-100)+50,
            y: Math.random()*(H-100)+50,
            size:12, pulse:0
        });
    }

    function spawnShadow(){
        let side=Math.floor(Math.random()*4);
        let sx,sy;
        if(side===0){sx=Math.random()*W;sy=-40;}
        else if(side===1){sx=W+40;sy=Math.random()*H;}
        else if(side===2){sx=Math.random()*W;sy=H+40;}
        else{sx=-40;sy=Math.random()*H;}
        let spd = 0.8 + time*0.03;
        shadows.push({x:sx,y:sy,size:18+Math.random()*10,speed:spd,wobble:Math.random()*Math.PI*2});
    }

    init();

    addEventListener('pointermove',(e)=>{mouseX=e.clientX;mouseY=e.clientY;});
    addEventListener('pointerdown',()=>{initA();});

    function update(dt){
        if(dead)return;
        time+=dt*0.016;
        score=time;
        document.getElementById('sc').textContent=time.toFixed(1)+'s';

        // Light follows mouse
        light.x+=(mouseX-light.x)*0.12*dt;
        light.y+=(mouseY-light.y)*0.12*dt;

        // Energy drains, radius shrinks
        light.energy -= 0.03*dt;
        light.targetR = 80 + light.energy*1.2;
        light.radius += (light.targetR - light.radius)*0.05*dt;
        if(light.energy <= 0) { light.energy=0; die(); }

        // Spawn shadows
        let spawnRate = Math.max(40, 150 - time*3);
        if(Math.random()*spawnRate < 1) spawnShadow();

        // Shadows
        for(let i=shadows.length-1;i>=0;i--){
            let s=shadows[i];
            s.wobble+=0.05*dt;
            let dx=light.x-s.x, dy=light.y-s.y;
            let dist=Math.sqrt(dx*dx+dy*dy);

            // Shadows flee from light when inside radius
            if(dist < light.radius*0.8) {
                s.x -= (dx/dist)*s.speed*1.5*dt;
                s.y -= (dy/dist)*s.speed*1.5*dt;
            } else {
                // Chase player
                s.x += (dx/dist)*s.speed*dt + Math.sin(s.wobble)*0.8;
                s.y += (dy/dist)*s.speed*dt + Math.cos(s.wobble)*0.8;
            }

            // Collision with player
            if(dist < s.size + 15 && dist > light.radius*0.7) {
                die(); break;
            }

            // Off screen cleanup
            if(s.x<-100||s.x>W+100||s.y<-100||s.y>H+100) { shadows.splice(i,1); }
        }

        // Orbs
        for(let i=orbs.length-1;i>=0;i--){
            let ob=orbs[i];
            ob.pulse=(Math.sin(time*4+i)*0.5+0.5);
            let dx=light.x-ob.x,dy=light.y-ob.y;
            if(Math.sqrt(dx*dx+dy*dy)<ob.size+20){
                light.energy=Math.min(100,light.energy+25);
                snd('orb');
                for(let j=0;j<15;j++) particles.push({
                    x:ob.x,y:ob.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,
                    life:1,color:'#fbbf24',size:Math.random()*4+2
                });
                orbs.splice(i,1);
                setTimeout(spawnOrb, 800+Math.random()*1500);
            }
        }

        // Particles
        for(let i=particles.length-1;i>=0;i--){
            let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=0.03*dt;
            if(p.life<=0)particles.splice(i,1);
        }

        // Ambient pulse
        if(Math.random()>0.97) snd('pulse');
    }

    function die(){
        if(dead)return;dead=true;snd('die');
        document.body.style.cursor='default';
        for(let i=0;i<60;i++) particles.push({
            x:light.x,y:light.y,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,
            life:1,color:Math.random()>0.5?'#fbbf24':'#fff',size:Math.random()*6+2
        });
        if(score>best){best=score;localStorage.setItem('shadowBest',best);document.getElementById('bst').textContent=best.toFixed(1)+'s';}
        document.getElementById('fsc').textContent=score.toFixed(1);
        setTimeout(()=>document.getElementById('go').classList.add('show'),700);
    }

    function restart(){init();}

    function draw(){
        // Pure black background
        $.fillStyle='#000';$.fillRect(0,0,W,H);

        // Light gradient
        if(!dead){
            let r = light.radius;
            let grd = $.createRadialGradient(light.x,light.y,0,light.x,light.y,r);
            grd.addColorStop(0,'rgba(255,240,180,0.25)');
            grd.addColorStop(0.3,'rgba(255,200,100,0.12)');
            grd.addColorStop(0.7,'rgba(255,160,50,0.04)');
            grd.addColorStop(1,'rgba(0,0,0,0)');
            $.fillStyle=grd;$.fillRect(0,0,W,H);

            // Inner bright core
            let grd2 = $.createRadialGradient(light.x,light.y,0,light.x,light.y,30);
            grd2.addColorStop(0,'rgba(255,255,230,0.6)');
            grd2.addColorStop(1,'rgba(255,255,230,0)');
            $.fillStyle=grd2;$.fillRect(light.x-40,light.y-40,80,80);

            // Light player dot
            $.beginPath();$.arc(light.x,light.y,8,0,Math.PI*2);
            $.fillStyle='#fff';$.shadowColor='#fbbf24';$.shadowBlur=30;$.fill();$.shadowBlur=0;

            // Energy bar (circular)
            $.beginPath(); $.arc(light.x,light.y,22, -Math.PI/2, -Math.PI/2 + (light.energy/100)*Math.PI*2);
            $.strokeStyle=`hsl(${light.energy*1.2},80%,55%)`;$.lineWidth=3;$.lineCap='round';$.stroke();
        }

        // Shadows
        for(let s of shadows){
            let dx=light.x-s.x,dy=light.y-s.y;
            let dist=Math.sqrt(dx*dx+dy*dy);
            let inLight = dist < light.radius*0.8;

            $.save();
            $.translate(s.x,s.y);

            // Shadow body - irregular shape
            $.fillStyle = inLight ? 'rgba(80,20,20,0.4)' : 'rgba(40,0,60,0.9)';
            $.shadowColor = inLight ? 'transparent' : '#4a0072';
            $.shadowBlur = inLight ? 0 : 20;
            $.beginPath();
            for(let a=0;a<Math.PI*2;a+=0.3){
                let r = s.size + Math.sin(a*3+s.wobble)*4;
                if(inLight) r *= 0.6;
                $.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            $.closePath();$.fill();

            // Eyes
            if(!inLight){
                $.fillStyle='#ff0040';$.shadowColor='#ff0040';$.shadowBlur=8;
                $.beginPath();$.arc(-5,-3,2.5,0,Math.PI*2);$.fill();
                $.beginPath();$.arc(5,-3,2.5,0,Math.PI*2);$.fill();
            }
            $.shadowBlur=0;
            $.restore();
        }

        // Orbs
        for(let ob of orbs){
            $.save();
            $.translate(ob.x,ob.y);
            $.shadowColor='#fbbf24';$.shadowBlur=20+ob.pulse*15;
            $.fillStyle=`hsl(45,90%,${50+ob.pulse*20}%)`;
            $.beginPath();
            // Star shape
            for(let i=0;i<5;i++){
                let a = (i/5)*Math.PI*2 - Math.PI/2;
                let r1 = ob.size, r2 = ob.size*0.45;
                $.lineTo(Math.cos(a)*r1, Math.sin(a)*r1);
                let a2 = a + Math.PI/5;
                $.lineTo(Math.cos(a2)*r2, Math.sin(a2)*r2);
            }
            $.closePath();$.fill();
            $.shadowBlur=0;
            $.restore();
        }

        // Particles
        for(let p of particles){
            $.globalAlpha=Math.max(0,p.life);
            $.fillStyle=p.color;
            $.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
        }
        $.globalAlpha=1;

        // Vignette
        let vig = $.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
        vig.addColorStop(0,'rgba(0,0,0,0)');
        vig.addColorStop(1,'rgba(0,0,0,0.6)');
        $.fillStyle=vig;$.fillRect(0,0,W,H);
    }

    let last=0;
    function loop(ts){let dt=Math.min((ts-last)/16.67,3);last=ts;update(dt);draw();requestAnimationFrame(loop);}
    requestAnimationFrame(loop);
    </script>
</body>
</html>
