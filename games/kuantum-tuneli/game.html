<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuantum Tüneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#06060e; font-family:'Outfit',sans-serif; touch-action:none; user-select:none; }
        canvas { display:block; }
        #ui {
            position:fixed; top:0; left:0; width:100%; padding:20px 25px;
            display:flex; justify-content:space-between; align-items:flex-start;
            pointer-events:none; z-index:10;
        }
        .gp {
            background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:12px 20px;
        }
        .sv { font-size:36px; font-weight:900; line-height:1; transition:transform 0.1s; }
        .sl { font-size:11px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:2px; }
        .bv { font-size:18px; font-weight:700; color:rgba(255,255,255,0.35); }

        #go {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(6,6,14,0.9); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
            flex-direction:column; align-items:center; justify-content:center; gap:12px;
        }
        #go.show { display:flex; }
        #go h1 { font-size:36px; font-weight:900; background:linear-gradient(135deg,#06b6d4,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        #go .fs { font-size:60px; font-weight:900; color:#fff; }
        #go .sub { font-size:13px; color:rgba(255,255,255,0.3); }
        .btn {
            margin-top:8px; padding:16px 50px; font-size:18px; font-weight:700; font-family:'Outfit',sans-serif;
            background:linear-gradient(135deg,#06b6d4,#8b5cf6); color:#fff; border:none; border-radius:50px;
            cursor:pointer; box-shadow:0 0 30px rgba(6,182,212,0.4); transition:transform 0.15s;
        }
        .btn:active { transform:scale(0.94); }

        #depthMeter {
            position:fixed; right:15px; top:50%; transform:translateY(-50%);
            width:6px; height:200px; background:rgba(255,255,255,0.05); border-radius:3px;
            pointer-events:none; z-index:10;
        }
        #depthFill {
            position:absolute; bottom:0; width:100%; border-radius:3px;
            background:linear-gradient(0deg, #06b6d4, #a855f7); transition:height 0.3s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="gp">
            <div class="sl">Derinlik</div>
            <div class="sv" id="sc" style="color:#67e8f9;">0</div>
        </div>
        <div class="gp" style="text-align:right">
            <div class="sl">Rekor</div>
            <div class="bv" id="bst">0</div>
        </div>
    </div>
    <div id="depthMeter"><div id="depthFill" style="height:0%"></div></div>
    <div id="go">
        <h1>KUANTUM ÇÖKTÜ</h1>
        <div class="fs" id="fsc">0</div>
        <div class="sub">derinliğe ulaşıldı</div>
        <button class="btn" onclick="restart()">Tekrar Dal</button>
    </div>
    <canvas id="c"></canvas>

    <script>
    const C=document.getElementById('c'),$=C.getContext('2d');
    let W,H,cx;
    function resize(){W=C.width=innerWidth;H=C.height=innerHeight;cx=W/2;}
    resize(); addEventListener('resize',resize);

    let ac;
    function initA(){if(ac)return;const ACtx=window.AudioContext||window.webkitAudioContext;if(ACtx)ac=new ACtx();}
    function snd(t){
        if(!ac||ac.state==='suspended')return;
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);const n=ac.currentTime;
        if(t==='pass'){
            o.type='sine';
            const f=[261,329,392,523,659][Math.floor(Math.random()*5)];
            o.frequency.setValueAtTime(f,n);o.frequency.exponentialRampToValueAtTime(f*2,n+0.15);
            g.gain.setValueAtTime(0.12,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.15);
            o.start(n);o.stop(n+0.15);
        } else if(t==='die'){
            o.type='sawtooth';o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(15,n+0.7);
            g.gain.setValueAtTime(0.5,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.7);
            o.start(n);o.stop(n+0.7);
        } else if(t==='warp'){
            o.type='triangle';o.frequency.setValueAtTime(100,n);o.frequency.linearRampToValueAtTime(2000,n+0.3);
            g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.4);
            o.start(n);o.stop(n+0.4);
        }
    }

    // BGM - low rumble
    let bgmTimer=0;
    function bgmTick(){
        if(!ac||ac.state==='suspended')return;
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='sine';o.frequency.value=40+Math.sin(time)*10;
        g.gain.setValueAtTime(0.04,ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
        o.start(ac.currentTime);o.stop(ac.currentTime+0.3);
    }

    let player, rings, particles, score, best, dead, speed, time;
    best = +localStorage.getItem('quantumBest') || 0;
    document.getElementById('bst').textContent = best;

    function init(){
        player = {x:cx,y:H*0.35,targetX:cx,size:12};
        rings=[]; particles=[];
        score=0; dead=false; speed=2.5; time=0;
        document.getElementById('sc').textContent='0';
        document.getElementById('go').classList.remove('show');

        // Pre-spawn rings
        for(let i=0;i<8;i++) spawnRing(H*0.55 + i*120);
    }

    function spawnRing(startY){
        let gapAngle = Math.random()*Math.PI*2;
        let gapSize = Math.max(0.6, 1.2 - score*0.004); // radians of gap
        let baseRadius = Math.min(W,H)*0.35;
        let ringRadius = baseRadius*(0.6 + Math.random()*0.4);
        let hue = (180 + score*3 + rings.length*30) % 360;
        rings.push({
            y: startY || H+80,
            radius: ringRadius,
            gapAngle: gapAngle,
            gapSize: gapSize,
            thickness: 8 + Math.random()*4,
            hue: hue,
            passed: false,
            phase: Math.random()*Math.PI*2,
            rotateSpeed: (Math.random()-0.5)*0.005 * (1+score*0.002)
        });
    }

    init();

    addEventListener('pointermove',(e)=>{initA();if(!dead)player.targetX=e.clientX;});
    addEventListener('pointerdown',(e)=>{initA();if(!dead)player.targetX=e.clientX;});
    addEventListener('keydown',(e)=>{
        initA();
        if(e.key==='ArrowLeft') player.targetX-=40;
        if(e.key==='ArrowRight') player.targetX+=40;
    });

    function restart(){init();}

    function update(dt){
        if(dead)return;
        time+=dt*0.016;
        speed=2.5+time*0.08;
        bgmTimer+=dt;
        if(bgmTimer>15){bgmTimer=0;bgmTick();}

        // Player smooth follow
        player.x += (player.targetX-player.x)*0.15*dt;
        player.x = Math.max(player.size, Math.min(W-player.size, player.x));

        // Rings move up
        for(let i=rings.length-1;i>=0;i--){
            let r=rings[i];
            r.y -= speed*dt;
            r.gapAngle += r.rotateSpeed*dt;

            // Check pass through
            if(!r.passed && r.y < player.y){
                // Check if player is in the gap
                let dx=player.x-cx, dy=player.y-r.y; // We position rings at center X
                // Player angle relative to ring center
                let playerAngle = Math.atan2(player.x-cx, 0); // simplified: just horizontal position mapped to angle
                // Better: check distance from center vs radius, and angle
                let distFromCenter = Math.abs(player.x - cx);

                // Is player near the ring's radius?
                if(Math.abs(distFromCenter - r.radius) < r.thickness+player.size) {
                    // Player is ON the ring - check if in gap
                    let pAngle = Math.atan2(0, player.x-cx); // angle of player position
                    // Simpler approach: map player x to angle
                    let normalizedX = (player.x - cx) / r.radius; // -1 to 1
                    normalizedX = Math.max(-1, Math.min(1, normalizedX));
                    let pAng = Math.acos(normalizedX);

                    let gA = ((r.gapAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
                    let pA = pAng % (Math.PI*2);

                    let diff = Math.abs(gA - pA);
                    if(diff > Math.PI) diff = Math.PI*2 - diff;

                    if(diff > r.gapSize/2) {
                        // HIT the ring wall!
                        die();
                        return;
                    }
                }
                r.passed=true;
                score++;
                document.getElementById('sc').textContent=score;
                document.getElementById('depthFill').style.height=Math.min(100,score*2)+'%';
                snd('pass');
                // Small effect
                for(let j=0;j<8;j++) particles.push({
                    x:player.x,y:player.y,
                    vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,
                    life:1,hue:r.hue,size:Math.random()*3+1
                });
                if(score%10===0) snd('warp');
            }

            if(r.y < -100) { rings.splice(i,1); spawnRing(); }
        }

        // Particles
        for(let i=particles.length-1;i>=0;i--){
            let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=0.03*dt;
            if(p.life<=0)particles.splice(i,1);
        }
    }

    function die(){
        if(dead)return;dead=true;snd('die');
        for(let i=0;i<50;i++) particles.push({
            x:player.x,y:player.y,vx:(Math.random()-0.5)*18,vy:(Math.random()-0.5)*18,
            life:1,hue:Math.random()*360,size:Math.random()*5+2
        });
        if(score>best){best=score;localStorage.setItem('quantumBest',best);document.getElementById('bst').textContent=best;}
        document.getElementById('fsc').textContent=score;
        setTimeout(()=>document.getElementById('go').classList.add('show'),600);
    }

    function draw(){
        // Deep space gradient
        let bg=$.createRadialGradient(cx,H*0.3,0,cx,H*0.3,H);
        bg.addColorStop(0,`hsl(${(240+time*5)%360},25%,8%)`);
        bg.addColorStop(1,'#030308');
        $.fillStyle=bg;$.fillRect(0,0,W,H);

        // Depth lines (perspective grid going to center)
        $.globalAlpha=0.04;
        $.strokeStyle='#fff';$.lineWidth=1;
        for(let i=0;i<12;i++){
            let a=(i/12)*Math.PI*2;
            $.beginPath();
            $.moveTo(cx,H*0.3);
            $.lineTo(cx+Math.cos(a)*W, H*0.3+Math.sin(a)*H);
            $.stroke();
        }
        $.globalAlpha=1;

        // Rings
        for(let r of rings){
            let screenScale = Math.max(0.1, (r.y-H*0.1)/(H*0.9)); // perspective scale
            let drawRadius = r.radius * screenScale;
            let drawY = r.y;

            $.save();
            $.translate(cx, drawY);

            // Ring arc (with gap)
            let gA = r.gapAngle;
            let gS = r.gapSize;

            $.lineWidth = r.thickness * screenScale;
            $.lineCap = 'round';

            // Main ring segments
            $.strokeStyle = `hsla(${r.hue},70%,55%,${0.3+screenScale*0.5})`;
            $.shadowColor = `hsl(${r.hue},80%,60%)`;
            $.shadowBlur = 15*screenScale;

            $.beginPath();
            $.arc(0,0,drawRadius, gA+gS/2, gA+Math.PI*2-gS/2);
            $.stroke();

            // Gap glow markers
            $.fillStyle=`hsla(${r.hue},90%,70%,${0.5+screenScale*0.5})`;
            $.shadowBlur=10;
            let gapEnd1x=Math.cos(gA+gS/2)*drawRadius, gapEnd1y=Math.sin(gA+gS/2)*drawRadius;
            let gapEnd2x=Math.cos(gA-gS/2)*drawRadius, gapEnd2y=Math.sin(gA-gS/2)*drawRadius;
            $.beginPath();$.arc(gapEnd1x,gapEnd1y,4*screenScale,0,Math.PI*2);$.fill();
            $.beginPath();$.arc(gapEnd2x,gapEnd2y,4*screenScale,0,Math.PI*2);$.fill();

            $.shadowBlur=0;
            $.restore();
        }

        // Player
        if(!dead){
            $.save();
            $.translate(player.x, player.y);
            // Outer glow
            let pg=$.createRadialGradient(0,0,0,0,0,30);
            pg.addColorStop(0,'rgba(103,232,249,0.3)');
            pg.addColorStop(1,'rgba(103,232,249,0)');
            $.fillStyle=pg;$.fillRect(-30,-30,60,60);
            // Core
            $.shadowColor='#67e8f9';$.shadowBlur=20;
            $.fillStyle='#fff';
            $.beginPath();$.arc(0,0,player.size,0,Math.PI*2);$.fill();
            $.fillStyle='#67e8f9';
            $.beginPath();$.arc(0,0,player.size*0.6,0,Math.PI*2);$.fill();
            $.shadowBlur=0;
            $.restore();

            // Trail
            particles.push({x:player.x,y:player.y+10,vx:(Math.random()-0.5)*2,vy:2,life:0.5,hue:190,size:3});
        }

        // Particles
        for(let p of particles){
            $.globalAlpha=Math.max(0,p.life);
            $.fillStyle=`hsl(${p.hue},80%,65%)`;
            $.beginPath();$.arc(p.x,p.y,p.size,0,Math.PI*2);$.fill();
        }
        $.globalAlpha=1;

        // Vignette
        let v=$.createRadialGradient(cx,H/2,H*0.25,cx,H/2,H*0.7);
        v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.5)');
        $.fillStyle=v;$.fillRect(0,0,W,H);
    }

    let last=0;
    function loop(ts){if(!ts)ts=performance.now();let dt=last===0?1:Math.min((ts-last)/16.67,3);last=ts;update(dt);draw();requestAnimationFrame(loop);}
    requestAnimationFrame(loop);
    </script>
</body>
</html>
