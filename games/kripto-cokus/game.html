<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kripto Çöküşü</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: 'Courier New', monospace; color: white; touch-action: none; }
        canvas { display: block; margin: 0 auto; background: #111; box-shadow: 0 0 40px inset #000; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .score { font-size: 40px; font-weight: bold; color: #00ff66; text-shadow: 0 0 20px #00ff66; }
        .game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #ff3333; border-radius: 10px; box-shadow: 0 0 50px #ff3333; }
        button { background: #00ff66; color: #000; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; margin-top: 20px; cursor: pointer; text-transform: uppercase; }
        @keyframes shake { 0% {transform: translate(3px,3px);} 20% {transform: translate(-3px,-3px);} 40% {transform: translate(-3px,3px);} 60% {transform: translate(3px,-3px);} 80% {transform: translate(3px,3px);} 100% {transform: translate(0,0);} }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>
    <div id="ui"><div class="score" id="scoreEl">0</div></div>
    <div class="game-over" id="goScreen">
        <h1 style="color:#ff3333; margin:0 0 10px 0;">PORTFÖY SIFIRLANDI</h1>
        <p>Bilanço: <span id="finalScore" style="color:#00ff66; font-size:24px; font-weight:bold;">0</span> DOGE</p>
        <button onclick="resetGame()">Yeniden Yatırım Yap</button>
    </div>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreEl');
        let width = canvas.width = window.innerWidth > 600 ? 500 : window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // Audio
        let actx;
        function play(t) {
            if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
            if(actx.state==='suspended') actx.resume();
            let o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            if(t==='score') { o.type='sine'; o.frequency.setValueAtTime(800, actx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, actx.currentTime+0.1); g.gain.setValueAtTime(0.2, actx.currentTime); }
            else if(t==='die') { o.type='sawtooth'; o.frequency.setValueAtTime(150, actx.currentTime); o.frequency.exponentialRampToValueAtTime(40, actx.currentTime+0.4); g.gain.setValueAtTime(0.5, actx.currentTime); }
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime+ (t==='die'?0.4:0.1));
            o.start(); o.stop(actx.currentTime+ (t==='die'?0.4:0.1));
        }

        let player = {y: height/2, v: 0, s: 20};
        let obstacles = [], particles = [];
        let frame = 0, score = 0, isDead = false;

        function createP(x,y,c, n) {
            for(let i=0;i<n;i++) particles.push({x,y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, c});
        }

        function resetGame() {
            obstacles = []; particles = [];
            player = {y: height/2, v: 0, s: 20};
            score = 0; scoreEl.innerText = 0;
            frame = 0; isDead = false;
            document.getElementById('goScreen').style.display = 'none';
        }

        window.addEventListener('pointerdown', () => { player.v = -8; if(!actx) play('score'); });
        window.addEventListener('keydown', () => { player.v = -8; if(!actx) play('score'); });

        function loop() {
            requestAnimationFrame(loop);
            if(isDead) return;
            ctx.fillStyle = 'rgba(10,10,12,0.3)'; ctx.fillRect(0,0,width,height);
            
            // Grid lines
            ctx.strokeStyle='#222'; ctx.beginPath();
            for(let i=0; i<height; i+=50) { ctx.moveTo(0, (i+frame)%height); ctx.lineTo(width, (i+frame)%height); }
            ctx.stroke();

            player.v += 0.4; player.y += player.v;
            
            // Draw Player
            ctx.fillStyle='#00ff66'; ctx.shadowBlur=20; ctx.shadowColor='#00ff66';
            ctx.fillRect(80, player.y, player.s, player.s);
            ctx.shadowBlur=0;
            createP(80, player.y+10, '#00ff66', 1); // trail

            // Obstacles
            if(frame % 90 === 0) {
                let gapY = Math.random() * (height-200) + 100;
                obstacles.push({x: width, gy: gapY, passed: false});
            }

            for(let i=0; i<obstacles.length; i++) {
                let o = obstacles[i];
                o.x -= (4 + score*0.1);
                
                ctx.fillStyle='#ff3333'; ctx.shadowBlur=15; ctx.shadowColor='#ff3333';
                // Top candle
                ctx.fillRect(o.x, 0, 40, o.gy - 75);
                ctx.fillRect(o.x+15, o.gy-75, 10, 30); // wick
                // Bottom candle
                ctx.fillRect(o.x, o.gy + 75, 40, height - (o.gy+75));
                ctx.fillRect(o.x+15, o.gy+45, 10, 30); // wick
                ctx.shadowBlur=0;

                // Collision
                let topH = o.gy-75;
                let botY = o.gy+75;
                if(80+player.s > o.x && 80 < o.x+40) {
                    if(player.y < topH || player.y+player.s > botY) {
                        createP(80, player.y, '#ff3333', 50);
                        isDead=true; play('die');
                        document.getElementById('goScreen').style.display='block';
                        document.getElementById('finalScore').innerText=score;
                        canvas.classList.add('shake');
                        setTimeout(()=>canvas.classList.remove('shake'),300);
                    }
                }

                if(!o.passed && o.x < 80) { o.passed = true; score++; scoreEl.innerText = score; play('score'); createP(80,player.y,'#00ff66',20);scoreEl.style.transform='scale(1.5)'; setTimeout(()=>scoreEl.style.transform='scale(1)',150);}
                if(o.x < -50) { obstacles.splice(i,1); i--; }
            }

            if(player.y > height || player.y < 0) { isDead=true; play('die'); document.getElementById('goScreen').style.display='block'; document.getElementById('finalScore').innerText=score; }

            // Particles
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                p.x+=p.vx; p.y+=p.vy; p.life-=0.05;
                ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,p.life);
                ctx.fillRect(p.x,p.y,4,4); ctx.globalAlpha=1;
                if(p.life<=0){particles.splice(i,1);i--;}
            }
            frame++;
        }
        loop();
    </script>
</body>
</html>
