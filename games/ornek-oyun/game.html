<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Sızıntısı</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top, rgba(0, 255, 200, 0.12), transparent 30%),
                #071014;
            color: #e8f6f5;
        }

        .game-shell {
            width: min(92vw, 900px);
            padding: 32px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 200, 0.18);
            background: rgba(8, 15, 22, 0.9);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: #00f5c4;
        }

        p {
            margin: 0;
            color: #9db3b3;
            line-height: 1.7;
        }

        a {
            display: inline-block;
            margin-top: 22px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #071014;
            background: #00f5c4;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="game-shell">
        <h1>Oyun Alanı</h1>
        <p>Bu sayfa, n8n tarafından üretilecek gerçek oyunun yerini tutan boş şablondur.</p>
        <a href="../../index.html">Ana Sayfaya Dön</a>
    </div>
</body>

</html>
