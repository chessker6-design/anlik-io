<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anlık oyna, anlık eğlen! anlık.io" />
    <title>anlık.io | Hemen Oyna</title>
    <!-- Modern Google Fontları: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Üst Menü -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">anlık.io</a>
            <ul class="top-menu">
                <li><a href="#" class="active">Ana Sayfa</a></li>
                <li><a href="#populer">Popüler</a></li>
                <li><a href="#">Yeni Eklentiler</a></li>
            </ul>
            <div class="search-container">
                <input id="searchInput" type="text" placeholder="Oyun ara..." autocomplete="off" />
            </div>
        </div>
    </nav>

    <main class="main-content">
        <!-- Kategoriler Çipleri (Zarif Butonlar) -->
        <section id="kategoriler" class="slider-section container">
            <div class="slider-wrapper">
                <button class="slider-btn left-btn" id="slideLeft">&lt;</button>
                <div class="category-chip-wrapper" id="categorySlider">
                    <button class="category-chip active" data-filter="all">Tümü</button>
                    <button class="category-chip" data-filter="aksiyon">Aksiyon</button>
                    <button class="category-chip" data-filter="arcade">Arcade</button>
                    <button class="category-chip" data-filter="zeka">Zeka</button>
                    <button class="category-chip" data-filter="strateji">Strateji</button>
                    <button class="category-chip" data-filter="yarış">Yarış</button>
                    <button class="category-chip" data-filter="macera">Macera</button>
                </div>
                <button class="slider-btn right-btn" id="slideRight">&gt;</button>
            </div>
        </section>

        <!-- Oyunlar Grid (Büyük Kartlar) -->
        <section id="populer" class="games-section container">
            <h2 class="section-title">Oyunlar</h2>
            
            <div id="gamesGrid" class="huge-grid">
                <!-- Javascript oyunları buraya büyük kare kartlar olarak basacak -->
            </div>

            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Oyunlar yükleniyor...</p>
            </div>

            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">😢</div>
                <h3>Oyun Bulunamadı</h3>
                <p>Aradığın kriterlere uygun oyun bulamadık. Lütfen farklı bir arama yap.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">anlık.io</div>
            <p>anlık.io - Hızlı tarayıcı oyun platformu.</p>
        </div>
    </footer>

    <!-- Oyun Detay Overlay (App Store Tarzı) -->
    <div id="gameDetailOverlay" class="detail-overlay">
        <div class="detail-content" id="detailContentBlock">
            <!-- Swipe down göstergesi (Çubuk) -->
            <div class="drag-indicator"></div>
            
            <!-- Kapat Butonu -->
            <button id="closeDetailBtn" class="close-btn" aria-label="Kapat">&times;</button>
            
            <!-- Header Alanı: İkon, Başlık ve Kategori -->
            <div class="detail-header">
                <img id="detailIcon" class="detail-icon" src="" alt="Oyun İkonu">
                <div class="detail-title-group">
                    <h2 id="detailTitle" class="detail-title">Oyun Adı</h2>
                    <span id="detailCategory" class="detail-category">Kategori</span>
                </div>
            </div>
            
            <!-- Hemen Oyna Butonu -->
            <a id="detailPlayBtn" href="#" class="detail-play-btn">HEMEN OYNA</a>
            
            <!-- Galeri (Yan yana kaydırılabilir görseller) -->
            <div class="detail-gallery">
                <img id="detailImg1" src="" class="gallery-img" alt="Gallery 1">
                <img id="detailImg2" src="" class="gallery-img" alt="Gallery 2">
            </div>
            
            <!-- Açıklama Alanı -->
            <div class="detail-section">
                <h3>Bu Oyun Hakkında</h3>
                <p id="detailDesc" class="detail-text"></p>
            </div>
            
            <!-- Nasıl Oynanır -->
            <div class="detail-section">
                <h3>Nasıl Oynanır?</h3>
                <p id="detailHowTo" class="detail-text"></p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
